function removeBaekoEditPos(posId){
  const row=document.getElementById('be-'+posId)?.closest('.pack-row');
  if(row)row.remove();
}

function addBaekoEditPos(orderId){
  const sel=document.getElementById('be-add-sel');
  const id=sel?.value;if(!id)return;
  const menge=parseFloat(document.getElementById('be-add-menge')?.value)||1;
  const o=db.bestellungen.find(x=>x.id===orderId);if(!o)return;
  const fil=o.filiale;
  const art=(BAEKO[fil]||[]).find(a=>a.id===id);if(!art)return;
  const rows=document.getElementById('be-rows');
  if(rows){
    rows.innerHTML+=`<div class="pack-row" style="grid-template-columns:1fr 80px 28px;margin-bottom:5px">
      <div style="font-size:13px;font-weight:500">${art.name}<br>
        <span style="font-size:11px;color:var(--light)">${art.id}</span></div>
      <input class="pack-inp" type="number" min="0" value="${menge}" id="be-${art.id}" placeholder="0">
      <button style="background:none;border:none;color:var(--light);cursor:pointer;font-size:16px;padding:0"
        onclick="removeBaekoEditPos('${art.id}')">✕</button>
    </div>`;
  }
  // Remove from dropdown
  sel.querySelector(`option[value="${id}"]`)?.remove();
  sel.value='';
}

function submitBaekoEdit(orderId){
  const o=db.bestellungen.find(x=>x.id===orderId);if(!o)return;
  const name=document.getElementById('be-name')?.value.trim();
  if(!name){toast('Bitte Namen eintragen.');return;}
  const fil=o.filiale;
  const alleArts=BAEKO[fil]||[];
  const aenderungen=[];
  // Neue Positionen aus Modal lesen
  const neuePos=[];
  // Bestehende Positionen
  o.positionen.forEach(p=>{
    const el=document.getElementById('be-'+p.id);
    if(!el)return; // wurde entfernt
    const nm=parseFloat(el.value)||0;
    if(nm>0){
      if(nm!==p.menge)aenderungen.push(`${p.name}: ${p.menge}→${nm}`);
      neuePos.push({...p,menge:nm});
    }else{
      aenderungen.push(`${p.name}: entfernt`);
    }
  });
  // Neu hinzugefügte Artikel
  alleArts.forEach(a=>{
    if(o.positionen.find(p=>p.id===a.id))return; // bereits vorhanden
    const el=document.getElementById('be-'+a.id);
    if(!el)return;
    const nm=parseFloat(el.value)||0;
    if(nm>0){
      neuePos.push({id:a.id,name:a.name,menge:nm});
      aenderungen.push(`${a.name}: neu +${nm}`);
    }
  });
  o.positionen=neuePos;
  if(!o.statusLog)o.statusLog=[];
  o.statusLog.push({
    status:o.status,datum:new Date().toISOString(),by:name,
    note:`Bearbeitet: ${aenderungen.length?aenderungen.join(', '):'keine Änderung'}`
  });
  save();closeModal();
  toast(`✅ Bestellung bearbeitet von ${name}`);
  refVwB();
}

function addReinigungArt(){
  const inp=document.getElementById('new-rart-name');
  const name=inp?.value.trim();
  if(!name){toast('Bitte Artikelname eingeben.');return;}
  const id='r'+Date.now();
  REINIGUNG_ART.push({id,name});
  inp.value='';
  // Re-render just the list
  const list=document.getElementById('rart-list');
  if(list){
    list.innerHTML=REINIGUNG_ART.map((a,i)=>`
      <div class="orow" style="gap:6px">
        <div style="flex:1;font-size:13px;font-weight:500">${a.name}</div>
        <button class="btn btn-o btn-sm" style="padding:3px 8px;font-size:12px;color:var(--red);border-color:var(--red)"
          onclick="delReinigungArt(${i})">✕</button>
      </div>`).join('');
  }
}

function delReinigungArt(idx){
  const name=REINIGUNG_ART[idx]?.name;
  if(!confirm(`"${name}" aus der Reinigungsliste löschen?`))return;
  REINIGUNG_ART.splice(idx,1);
  // Re-render list
  const list=document.getElementById('rart-list');
  if(list){
    list.innerHTML=REINIGUNG_ART.map((a,i)=>`
      <div class="orow" style="gap:6px">
        <div style="flex:1;font-size:13px;font-weight:500">${a.name}</div>
        <button class="btn btn-o btn-sm" style="padding:3px 8px;font-size:12px;color:var(--red);border-color:var(--red)"
          onclick="delReinigungArt(${i})">✕</button>
      </div>`).join('');
  }
}

function saveReinigungArtikelliste(){
  if(!fbRef){toast('⚠️ Keine Firebase-Verbindung.');return;}
  fbRef.child('reinigung_artikel').set(REINIGUNG_ART)
    .then(()=>toast('✅ Reinigungsliste gespeichert!'))
    .catch(()=>toast('❌ Speichern fehlgeschlagen.'));
}

function renderVwSonder(){
  const mc=document.getElementById('mc');
  const alle=(db.sonder||[]).slice().sort((a,b)=>(b.erstellt||b.datum||'').localeCompare(a.erstellt||a.datum||''));

  // Nach Eingangsdatum gruppieren
  const byDate={};
  alle.forEach(s=>{
    const d=(s.erstellt||s.datum||'').slice(0,10)||'unbekannt';
    if(!byDate[d])byDate[d]=[];
    byDate[d].push(s);
  });
  const dateKeys=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  const sonderItem=s=>`
    <div class="hitem" style="margin-bottom:6px">
      <div class="hhead" onclick="th(this)" style="padding:10px 14px">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
          <span style="font-weight:700;font-size:14px">${fname(s.filiale)}</span>
          ${s.datum?`<span style="font-size:12px;color:var(--mid)">für ${new Date(s.datum+'T00:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}</span>`:''}
          ${s.tour?`<span style="font-size:12px;color:var(--light)">· ${s.tour}</span>`:''}
          ${s.name?`<span style="font-size:11px;color:var(--light)">· ${s.name}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span style="font-size:11px;color:var(--light)">${s.erstellt?new Date(s.erstellt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}):''}</span>
          <span class="st ${stcls(s.status||'offen')}">${stlbl(s.status||'offen')}</span>
          <span style="color:var(--xlight);font-size:16px">›</span>
        </div>
      </div>
      <div class="hbody" style="padding:10px 14px">
        ${s.text?`<div style="font-size:13px;white-space:pre-wrap;margin-bottom:8px">${s.text}</div>`:''}
        <div class="brow no-print" style="margin-top:6px">
          <select style="font-size:12px;padding:5px 9px;border:1.5px solid var(--border);border-radius:var(--rsm);background:white"
            onchange="(()=>{const o=db.sonder.find(x=>x.id==='${s.id}');if(o){o.status=this.value;save();renderVwSonder();}this.value=''})()">
            <option value="">Status ändern…</option>
            <option value="offen">Offen</option>
            <option value="bestaetigt">Bestätigt</option>
          </select>
          <button class="btn btn-o btn-sm" onclick="printLZ('${s.id}')">🖨️ Laufzettel</button>
        </div>
      </div>
    </div>`;

  const grouped=dateKeys.length?dateKeys.map(d=>{
    const lbl=d!=='unbekannt'?new Date(d+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}):'-';
    return`<div style="margin-bottom:18px">
      <div style="font-size:13px;font-weight:700;padding:6px 0;border-bottom:1.5px solid var(--border);margin-bottom:8px">${lbl}</div>
      ${byDate[d].map(sonderItem).join('')}

  }).join('')
  :`<p style="color:var(--light);font-size:13px;padding:10px 0">Keine Sonderbestellungen vorhanden.</p>`;

  mc.innerHTML=`<div class="card">
    <div class="ctitle">⭐ Sonderbestellungen</div>
    <p style="font-size:12px;color:var(--light);margin-bottom:14px">Alle eingegangenen Sonderbestellungen – neueste zuerst</p>

}

function renderLager(){
  const mc=document.getElementById('mc');
  const kats=[...new Set(LAGER_ART.map(a=>a.kat))];
  const rows=kats.map(kat=>{
    const arts=LAGER_ART.filter(a=>a.kat===kat);
    return`<div class="slbl" style="font-size:13px;font-weight:700;margin-top:14px;margin-bottom:6px">${kat}</div>`+
    arts.map(a=>{
      const curr=db.lager[a.id]||{menge:0,min:a.min};
      const low=curr.menge<=(curr.min||a.min);
      return`<div class="orow">
        <div style="flex:1">
          <div class="aname" style="${low?'color:var(--red)':''}">${a.name}${low?' ⚠️':''}</div>
          <div style="font-size:11px;color:var(--light)">Mindestbestand: ${curr.min||a.min} ${a.unit||''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn btn-o btn-sm" onclick="changeLager('${a.id}',-1)" style="padding:4px 10px;font-size:16px">−</button>
          <span style="font-size:15px;font-weight:700;min-width:28px;text-align:center" id="lm-${a.id}">${curr.menge}</span>
          <button class="btn btn-o btn-sm" onclick="changeLager('${a.id}',1)" style="padding:4px 10px;font-size:16px">+</button>
          <span style="font-size:12px;color:var(--light)">${a.unit||''}</span>
        </div>
      </div>`;
    }).join('');
  }).join('');

  // Letzte 10 Log-Einträge
  const log=(db.lagerLog||[]).slice(-10).reverse();
  const logHTML=log.length?`<div style="margin-top:18px;border-top:1px solid var(--border);padding-top:12px">
    <div class="slbl" style="margin-bottom:8px">Letzte Buchungen</div>
    ${log.map(e=>`<div style="display:flex;gap:10px;font-size:12px;padding:4px 0;border-bottom:.5px solid var(--border)">
      <span style="color:var(--light);min-width:120px">${dts(e.datum)}</span>
      <span style="font-weight:500">${e.name}</span>
      <span style="${e.delta>0?'color:var(--green)':'color:var(--red)'}">${e.delta>0?'+':''}${e.delta} ${e.unit||''}</span>
      <span style="color:var(--light)">${e.by||''}</span>
    </div>`).join('')}
  </div>`:'';

  mc.innerHTML=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="ctitle" style="margin-bottom:0">🏪 Lager</div>
      <button class="btn btn-o btn-sm" onclick="openWareneingangModal()">📥 Wareneingang</button>
    </div>
    <p style="font-size:12px;color:var(--light);margin-bottom:4px">HW-Entnahmen werden automatisch gebucht. Wareneingang manuell erfassen.</p>
    ${rows}
    ${logHTML}
    <div class="brow" style="margin-top:16px">
      <button class="btn btn-p" onclick="saveLager()">💾 Speichern</button>
    </div>
  </div>`;
}

function changeLager(id, delta){
  if(!db.lager[id])db.lager[id]={menge:0,min:LAGER_ART.find(a=>a.id===id)?.min||0};
  const art=LAGER_ART.find(a=>a.id===id);
  db.lager[id].menge=Math.max(0,(db.lager[id].menge||0)+delta);
  // Log
  if(!db.lagerLog)db.lagerLog=[];
  db.lagerLog.push({datum:new Date().toISOString(),id,name:art?.name||id,delta,unit:art?.unit||'',by:U});
  const el=document.getElementById('lm-'+id);
  if(el)el.textContent=db.lager[id].menge;
  const low=db.lager[id].menge<=(db.lager[id].min||art?.min||0);
  const row=el?.closest('.orow');
  if(row){const nm=row.querySelector('.aname');if(nm){nm.style.color=low?'var(--red)':'';nm.textContent=(art?.name||id)+(low?' ⚠️':'');}}
}

function saveLager(){
  save();toast('✅ Lagerbestände gespeichert!');
}

function openWareneingangModal(){
  const kats=[...new Set(LAGER_ART.map(a=>a.kat))];
  const rows=kats.map(kat=>{
    const arts=LAGER_ART.filter(a=>a.kat===kat);
    return`<div style="font-size:11px;font-weight:700;color:var(--light);text-transform:uppercase;margin:10px 0 4px">${kat}</div>`+
    arts.map(a=>`<div class="pack-row" style="grid-template-columns:1fr 80px;margin-bottom:4px">
      <div style="font-size:13px">${a.name} <span style="font-size:11px;color:var(--light)">(Bestand: ${(db.lager[a.id]||{menge:0}).menge} ${a.unit||''})</span></div>
      <input class="pack-inp" type="number" min="0" value="0" id="we-${a.id}" placeholder="0">
    </div>`).join('');
  }).join('');
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">📥 Wareneingang erfassen</div>
        <p style="font-size:12px;color:var(--light);margin-bottom:12px">Menge eingeben die neu eingelagert wurde. 0 = keine Änderung.</p>
        ${rows}
        <div class="brow" style="margin-top:14px">
          <button class="btn btn-p" onclick="submitWareneingang()">✅ Eingang buchen</button>
          <button class="btn btn-o" onclick="closeModal()">Abbrechen</button>
        </div>
      </div>
    </div>`;
}

function submitWareneingang(){
  let count=0;
  LAGER_ART.forEach(a=>{
    const el=document.getElementById('we-'+a.id);
    const v=parseFloat(el?.value)||0;
    if(v>0){
      if(!db.lager[a.id])db.lager[a.id]={menge:0,min:a.min};
      db.lager[a.id].menge=(db.lager[a.id].menge||0)+v;
      if(!db.lagerLog)db.lagerLog=[];
      db.lagerLog.push({datum:new Date().toISOString(),id:a.id,name:a.name,delta:v,unit:a.unit||'',by:U,typ:'eingang'});
      count++;
    }
  });
  if(!count){toast('Keine Mengen eingegeben.');return;}
  save();closeModal();toast(`✅ ${count} Artikel eingebucht.`);renderLager();
}

function submitReinigung(){
  const pos=[];
  REINIGUNG_ART.forEach(a=>{const el=document.getElementById('rq-'+a.id);const v=parseFloat(el?.value);if(el&&v>0)pos.push({id:a.id,name:a.name,menge:v});});
  if(!pos.length){toast('Bitte mind. einen Artikel eintragen.');return;}
  const kommentar=document.getElementById('rein-kommentar')?.value.trim()||'';
  const eintrag={id:uid(),filiale:U,datum:new Date().toISOString(),positionen:pos,kommentar,statusLog:[{status:'offen',datum:new Date().toISOString(),by:U}]};
  if(!db.reinigung)db.reinigung=[];
  db.reinigung.push(eintrag);
  save();toast('✅ Reinigungsbestellung eingegangen!');renderReinigung();
}
