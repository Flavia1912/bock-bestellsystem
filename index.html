@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
:root{
  --bg:#f9f9f9;--card:#fff;--cream:#f4f4f4;
  --black:#0a0a0a;--dark:#1a1a1a;--mid:#555;--light:#888;--xlight:#bbb;
  --border:#e0e0e0;--border-dark:#333;
  --accent:#0a0a0a;--accent-lt:#f0f0f0;
  --green:#1a7a3a;--green-lt:#e8f5ed;
  --red:#c0392b;--red-lt:#fdecea;
  --amber:#b8860b;--amber-lt:#fef8e1;
  --blue:#1a4a7a;--blue-lt:#e8f0fb;
  --shadow:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.10);
  --r:10px;--rsm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#0a0a0a;padding:20px}
.lcard{background:white;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
.lcard img{height:44px;object-fit:contain;margin-bottom:4px;filter:invert(0)}
.ltag{font-size:10px;color:var(--xlight);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}
.ldesc{font-size:11px;color:var(--xlight);margin-bottom:28px;font-style:italic}
.lcard select,.lcard input[type=password]{width:100%;padding:12px 14px;border:1.5px solid var(--border);
  border-radius:var(--rsm);font-family:'Inter',sans-serif;font-size:14px;color:var(--dark);
  background:var(--bg);margin-bottom:10px;outline:none;transition:border-color .2s;appearance:none}
.lcard select:focus,.lcard input:focus{border-color:var(--black)}
.btn-login{width:100%;padding:13px;background:var(--black);color:white;border:none;
  border-radius:var(--rsm);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;letter-spacing:.03em;transition:opacity .2s}
.btn-login:hover{opacity:.85}
.lerr{color:var(--red);font-size:12px;margin-top:8px;display:none}

/* APP SHELL */
#app{display:none;min-height:100vh}
.topbar{background:var(--black);color:white;padding:0 16px;height:52px;display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tbl{display:flex;align-items:center;gap:10px}
.tbl img{height:26px;filter:invert(1);opacity:.95}
.tdiv{width:1px;height:22px;background:rgba(255,255,255,.15)}
.tname{font-size:12px;opacity:.6;letter-spacing:.02em}
.tbr{display:flex;align-items:center;gap:8px}
.fbst{font-size:11px;opacity:.7}
.brole{background:white;color:var(--black);font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:20px;letter-spacing:.05em}
.blogout{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);
  padding:5px 11px;border-radius:var(--rsm);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:border-color .2s}
.blogout:hover{border-color:white;color:white}

/* NAV */
.nav{background:white;border-bottom:1.5px solid var(--border);display:flex;overflow-x:auto;
  scrollbar-width:none;padding:0 12px}
.nav::-webkit-scrollbar{display:none}
.ntab{padding:12px 14px;font-size:13px;font-weight:500;color:var(--light);
  border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;
  transition:color .15s,border-color .15s;margin-bottom:-1.5px;letter-spacing:.01em}
.ntab.active{color:var(--black);border-bottom-color:var(--black);font-weight:600}
.ntab:hover{color:var(--dark)}

/* MAIN */
.main{padding:16px;max-width:900px;margin:0 auto}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:20px;margin-bottom:14px;border:1px solid var(--border)}
.ctitle{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--black);
  margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* STARTSEITE KACHELN */
.kacheln{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:4px}
.kachel{background:white;border:1.5px solid var(--border);border-radius:var(--r);
  padding:22px 16px;text-align:center;cursor:pointer;transition:border-color .2s,box-shadow .2s;
  display:flex;flex-direction:column;align-items:center;gap:8px}
.kachel:hover{border-color:var(--black);box-shadow:var(--shadow-md)}
.kachel:active{transform:scale(.98)}
.kachel-icon{font-size:28px}
.kachel-lbl{font-size:13px;font-weight:600;color:var(--dark);letter-spacing:.01em}
.kachel-sub{font-size:11px;color:var(--light)}
.kachel.highlight{border-color:var(--black);background:var(--black)}
.kachel.highlight .kachel-lbl,.kachel.highlight .kachel-sub{color:white}

/* BANNER */
.banner{padding:14px 16px;border-radius:var(--rsm);margin-bottom:14px;
  display:flex;align-items:flex-start;gap:10px;font-size:13px;font-weight:500}
.banner-warn{background:#1a1a1a;color:white;border-left:4px solid white}
.banner-ok{background:var(--green-lt);color:var(--green);border-left:4px solid var(--green)}
.banner-info{background:var(--blue-lt);color:var(--blue);border-left:4px solid var(--blue)}
.banner-red{background:var(--red-lt);color:var(--red);border-left:4px solid var(--red)}

/* WEEK BAR */
.wbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.wlbl{font-size:11px;color:var(--light);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
input[type=week],input[type=date],input[type=month],input[type=text],input[type=number],textarea,select.finp{
  padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--rsm);
  font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);background:white;outline:none;
  transition:border-color .2s}
input:focus,textarea:focus,select.finp:focus{border-color:var(--black)}

/* STATUS PILLS */
.st{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em}
.st-offen{background:#f0f0f0;color:#555}
.st-gepackt{background:var(--blue-lt);color:var(--blue)}
.st-teilweise{background:var(--amber-lt);color:var(--amber)}
.st-versendet{background:#e8f5ed;color:var(--green)}
.st-angekommen{background:var(--green-lt);color:var(--green)}
.st-bestaetigt{background:#e8ffe8;color:#155724}

/* TABLES */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--cream);color:var(--mid);font-weight:600;font-size:11px;
  text-transform:uppercase;letter-spacing:.06em;padding:8px 12px;text-align:left;
  border-bottom:1.5px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}

/* ORDER ROWS */
.orow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;
  padding:10px 13px;background:var(--bg);border-radius:var(--rsm);
  border:1.5px solid var(--border);margin-bottom:5px;transition:border-color .15s}
.orow:hover{border-color:var(--dark)}
.aname{font-weight:500;font-size:13px;color:var(--dark)}
.avpe{font-size:11px;color:var(--light);margin-top:1px}
.qinp{width:72px;padding:10px 8px;border:1.5px solid var(--border);border-radius:var(--rsm);
  font-size:16px;font-family:'Inter',sans-serif;text-align:center;background:white;outline:none;
  min-height:44px;-webkit-appearance:none;}
.qinp:focus{border-color:var(--black)}
.qinp[data-filled="1"]{border-color:var(--black);background:#f0f0f0;font-weight:600}

/* SECTION LABEL */
.slbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--light);
  font-weight:700;margin:12px 0 7px;display:block}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--rsm);font-family:'Inter',sans-serif;font-size:13px;
  font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s;
  display:inline-flex;align-items:center;gap:5px;letter-spacing:.02em}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--black);color:white}.btn-p:hover{opacity:.85}
.btn-g{background:var(--green);color:white}.btn-g:hover{opacity:.85}
.btn-r{background:var(--red);color:white}.btn-r:hover{opacity:.85}
.btn-o{background:white;border:1.5px solid var(--border);color:var(--dark)}.btn-o:hover{border-color:var(--dark)}
.btn-sm{padding:5px 10px;font-size:12px}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

/* FORM FIELDS */
.sform input,.sform textarea,.sform select{width:100%;padding:10px 12px;border:1.5px solid var(--border);
  border-radius:var(--rsm);font-family:'Inter',sans-serif;font-size:13px;background:white;
  color:var(--dark);outline:none;margin-bottom:9px;transition:border-color .2s}
.sform textarea{resize:vertical;min-height:75px}
.sform input:focus,.sform textarea:focus,.sform select:focus{border-color:var(--black)}
.flbl{font-size:11px;font-weight:600;color:var(--mid);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:4px;display:block}

/* HISTORY ITEMS */
.hitem{border:1.5px solid var(--border);border-radius:var(--rsm);margin-bottom:6px;overflow:hidden}
.hhead{padding:12px 14px;background:white;display:flex;justify-content:space-between;
  align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .15s}
.hhead:hover{background:var(--bg)}.hbody{padding:14px;display:none;border-top:1px solid var(--border)}
.hbody.open{display:block}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.scard{background:white;border:1.5px solid var(--border);border-radius:var(--rsm);
  padding:16px 12px;text-align:center}
.snum{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--black)}
.slabel{font-size:10px;color:var(--light);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}

/* SIG */
canvas#sig-canvas{border:1.5px dashed var(--border);border-radius:var(--rsm);width:100%;
  height:90px;cursor:crosshair;touch-action:none;background:white;display:none}
.sig-area{border:1.5px dashed var(--border);border-radius:var(--rsm);height:60px;display:flex;
  align-items:center;justify-content:center;color:var(--light);font-size:13px;
  cursor:pointer;transition:border-color .15s;margin-top:8px}
.sig-area:hover{border-color:var(--dark)}
.sigctrl{display:none;gap:6px;margin-top:5px}.sigctrl.vis{display:flex}

/* FILTER */
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.frow select,.frow input{padding:7px 10px;border:1.5px solid var(--border);
  border-radius:var(--rsm);font-family:'Inter',sans-serif;font-size:13px;
  background:white;color:var(--dark);outline:none}
.frow select:focus,.frow input:focus{border-color:var(--black)}

/* INVENTUR */
.invrow{display:grid;grid-template-columns:1fr 75px 75px 55px;gap:8px;align-items:center;
  padding:9px 12px;background:var(--bg);border-radius:var(--rsm);
  border:1.5px solid var(--border);margin-bottom:5px}
.iinp{padding:6px 8px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px;
  font-family:'Inter',sans-serif;text-align:center;outline:none;background:white;width:100%}
.iinp:focus{border-color:var(--black)}
.dpos{color:var(--green);font-weight:700;font-size:13px;text-align:center}
.dneg{color:var(--red);font-weight:700;font-size:13px;text-align:center}

/* LAGER */
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:12px}
.litem{background:white;border:1.5px solid var(--border);border-radius:var(--rsm);padding:14px;position:relative}
.litem.warn{border-color:var(--amber)}.litem.crit{border-color:var(--red)}
.lname{font-weight:600;font-size:13px;margin-bottom:4px}
.lqty{font-size:1.5rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--black)}
.lunit{font-size:11px;color:var(--light)}.lwbadge{position:absolute;top:8px;right:8px;font-size:13px}
.lerow{display:flex;gap:6px;margin-top:8px}
.lerow input{flex:1;padding:5px 7px;border:1.5px solid var(--border);border-radius:var(--rsm);
  font-size:13px;font-family:'Inter',sans-serif;outline:none;min-width:0}

/* TIMELINE */
.tline{border-left:2px solid var(--border);padding-left:14px;margin-left:5px}
.tli{position:relative;margin-bottom:10px}
.tli::before{content:'';position:absolute;left:-19px;top:4px;width:8px;height:8px;
  border-radius:50%;background:var(--dark);border:2px solid white;box-shadow:0 0 0 2px var(--border)}
.tld{font-size:11px;color:var(--light);margin-bottom:1px}

/* ARTIKEL VERWALTUNG */
.art-mgmt-row{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:white;border:1.5px solid var(--border);border-radius:var(--rsm);margin-bottom:5px}
.art-mgmt-row:hover{border-color:var(--dark)}
.art-mgmt-row.drag-over{border:2px dashed var(--black);background:#f5f5f5}
.art-mgmt-row.dragging{opacity:0.4}
.drag-handle{cursor:grab;color:var(--light);font-size:16px;padding:0 4px;user-select:none;flex-shrink:0}
.drag-handle:active{cursor:grabbing}

/* PRINT */
@media print{#login-screen,.topbar,.nav,.btn,.brow,.frow,.no-print,canvas{display:none!important}
  .hbody{display:block!important}.card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}
  body{background:white;font-size:12px}}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--black);color:white;
  padding:12px 16px;border-radius:var(--rsm);font-size:13px;font-weight:500;
  box-shadow:var(--shadow-md);z-index:9999;transform:translateY(80px);opacity:0;
  transition:transform .3s,opacity .3s;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}

/* PACKEN MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:white;border-radius:var(--r);padding:24px;max-width:500px;width:100%;
  max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:16px}
.pack-row{display:grid;grid-template-columns:1fr 70px 70px;gap:8px;align-items:center;
  padding:8px 10px;background:var(--bg);border-radius:var(--rsm);margin-bottom:5px;font-size:13px}
.pack-row.fehlend{border-left:3px solid var(--red)}
.pack-inp{padding:6px 8px;border:1.5px solid var(--border);border-radius:var(--rsm);
  font-size:13px;font-family:'Inter',sans-serif;text-align:center;outline:none;background:white;width:100%}
.pack-inp:focus{border-color:var(--black)}

hr.div{border:none;border-top:1px solid var(--border);margin:12px 0}
@media(max-width:600px){.main{padding:12px}.card{padding:14px}.kacheln{grid-template-columns:1fr 1fr}
  .invrow{grid-template-columns:1fr 60px 60px 45px}.sgrid{grid-template-columns:1fr 1fr}
  .lgrid{grid-template-columns:1fr 1fr}}
</style>
</head>

const BAEKO_SHEET_ID='1Px5DvLSZWxP9exKxGTTwwkFplluZfNK4YBM_SblyHUo';
const BAEKO_FILIALEN=['B1','B5','B7','B8','B11','B12','B16'];
function loadBaekoFromSheet(forcedFilialen){
  // Sheet ist Master für BÄKO – immer alle Filialen laden
  const toLoad=forcedFilialen||BAEKO_FILIALEN;
  const promises=toLoad.map(fil=>{
    const url=`https://docs.google.com/spreadsheets/d/${BAEKO_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(fil)}`;
    return fetch(url)
      .then(r=>r.text())
      .then(text=>{
        const json=JSON.parse(text.replace(/^[^{]*|[^}]*$/g,''));
        const rows=json.table?.rows;
        if(!rows||!rows.length)return;
        const items=[];
        rows.forEach(row=>{
          const c=row.c;
          if(!c||!c[1]||!c[1].v)return; // Bezeichnung Pflicht
          const id=c[0]?String(c[0].v||'').trim():'';
          const name=String(c[1].v||'').trim();
          const kat=c[2]?String(c[2].v||'').trim():'';
          if(name)items.push({id,name,kat});
        });
        if(items.length>0){BAEKO[fil]=items;}
      })
      .catch(e=>console.warn(`Sheet-Tab ${fil} fehlgeschlagen:`,e));
  });
  Promise.all(promises).then(()=>{
    console.log(`BÄKO-Listen aus Google Sheet geladen: ${toLoad.join(', ')}`);
  });
}

function initFirebase(){
  try{
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);else firebase.app();
    fbRef=firebase.database().ref('bock');
    fbReady=true;
    let lastOrdCount=-1,lastSondCount=-1;
    fbRef.on('value',snap=>{
      const data=snap.val();
      if(data){
        db.bestellungen=data.bestellungen?Object.values(data.bestellungen):[];
        db.sonder=data.sonder?Object.values(data.sonder):[];
        db.inventuren=data.inventuren?Object.values(data.inventuren):[];
        db.lager=data.lager||db.lager;
        db.lagerLog=data.lagerLog?Object.values(data.lagerLog):[];
        // BÄKO wird über Google Sheet gepflegt – baeko_artikel in Firebase wird ignoriert
        if(data.metro_artikel){
          Object.keys(data.metro_artikel).forEach(fil=>{
            const v=data.metro_artikel[fil];
            METRO[fil]=Array.isArray(v)?v:Object.values(v);
          });
        }
        if(data.lager_artikel&&data.lager_artikel.length){
          LAGER_ART.length=0;
          data.lager_artikel.forEach(a=>LAGER_ART.push(a));
        }
        if(data.kuehltheke)db.kuehltheke=data.kuehltheke;
        if(data.putzplan)db.putzplan=data.putzplan;
      }
      // Benachrichtigungen für B1 + Verwaltung
      if((U==='B1'||U==='Verwaltung')&&lastOrdCount>=0){
        if(db.bestellungen.length>lastOrdCount){
          const n=db.bestellungen[db.bestellungen.length-1];
          showNotif('📋 Neue Bestellung',`${n?.filiale||''} · KW ${n?.week||''} · ${n?.typ==='baeko'?'Bäko':'Metro'}`);
        }
        if(db.sonder.length>lastSondCount){
          const n=db.sonder[db.sonder.length-1];
          showNotif('⭐ Neue Sonderbestellung',`${n?.filiale||''} · ${n?.datum||''}`);
        }
      }
      lastOrdCount=db.bestellungen.length;lastSondCount=db.sonder.length;
      // Live-Update der aktuellen Ansicht
      const active=document.querySelector('.ntab.active');
      if(active&&U)renderPanel(active.dataset.p);
      // Startseite neu laden für Banner
      if(U)updateStartBanner();
    });
    setFbSt('☁️','#1a7a3a');
  }catch(e){
    console.warn('Firebase offline:',e);fbReady=false;setFbSt('⚠️','#c0392b');
    showOfflineBanner();
    try{const d=localStorage.getItem('bock_db');if(d)db=JSON.parse(d);}catch{}
  }
}

function cw(){const n=new Date(),d=new Date(Date.UTC(n.getFullYear(),n.getMonth(),n.getDate()));const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));const wn=Math.ceil((((d-ys)/86400000)+1)/7);return d.getUTCFullYear()+'-W'+String(wn).padStart(2,'0');}
function getNextWeekDates(){
  // Montag und Sonntag der nächsten Woche
  const n=new Date();
  const day=n.getDay()||7; // 1=Mo...7=So
  const diff=8-day; // Tage bis nächsten Montag
  const mo=new Date(n);mo.setDate(n.getDate()+diff);
  const so=new Date(mo);so.setDate(mo.getDate()+6);
  return {mo,so};
}
// Gewählte Woche (überschreibbar per UI)
let _selectedWeekMo=null;
function getSelectedWeekMo(){
  if(_selectedWeekMo)return new Date(_selectedWeekMo);
  return getNextWeekDates().mo;
}
function weekLabelFromMo(mo){
  const so=new Date(mo);so.setDate(mo.getDate()+6);
  const fmt=d=>d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
  return fmt(mo).slice(0,5)+' – '+fmt(so);
}
function weekFrISOFromMo(mo){
  const fr=new Date(mo);fr.setDate(mo.getDate()+4);
  return fr.toISOString().split('T')[0];
}
function renderWeekPicker(id){
  // Generiert ein Wochen-Input mit Vor/Zurück-Pfeil + Label
  const mo=getSelectedWeekMo();
  const moISO=mo.toISOString().split('T')[0];
  const label=weekLabelFromMo(mo);
  return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;background:var(--offwhite);border:1.5px solid var(--border);border-radius:var(--rsm);padding:9px 12px">
    <span style="font-size:13px">📅 Bestellwoche:</span>
    <button onclick="shiftWeek(-1,'${id}')" style="background:none;border:1.5px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:14px">‹</button>
    <span id="wlbl-${id}" style="font-weight:600;font-size:13px;min-width:130px;text-align:center">${label}</span>
    <button onclick="shiftWeek(1,'${id}')" style="background:none;border:1.5px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:14px">›</button>
    <input type="hidden" id="wmiso-${id}" value="${moISO}">
  </div>`;
}
function shiftWeek(dir,id){
  const cur=getSelectedWeekMo();
  cur.setDate(cur.getDate()+dir*7);
  _selectedWeekMo=cur.toISOString().split('T')[0];
  // Update alle aktiven WeekPicker
  document.querySelectorAll('[id^="wlbl-"]').forEach(el=>{
    el.textContent=weekLabelFromMo(cur);
  });
  document.querySelectorAll('[id^="wmiso-"]').forEach(el=>{
    el.value=_selectedWeekMo;
  });
  // Existenz-Check neu laden
  if(id==='baeko')checkBEx();
  else if(id==='metro')checkMEx();
}

  return weekLabelFromMo(getSelectedWeekMo());
}
function nextWeekFr(){
  const mo=getSelectedWeekMo();
  const fr=new Date(mo);fr.setDate(mo.getDate()+4);
  return fr.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
}

}
function nextWeekMoISO(){

}

function dtd(iso){return new Date(iso).toLocaleDateString('de-DE');}
function uid(){return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function doLogin(){
  const f=document.getElementById('lf').value,p=document.getElementById('lpw').value;
  if(!f){showErr('Filiale wählen.');return;}
  if(p!==PW[f]){showErr('Falsches Passwort.');return;}
  U=f;
  // Login persistieren
  try{localStorage.setItem('bock_session',f);}catch{}
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('trole').textContent=f;
  document.getElementById('tname').textContent='';
  if('Notification' in window&&Notification.permission==='default'&&(U==='B1'||U==='Verwaltung'))
    Notification.requestPermission();
  initFirebase();
  buildNav();renderPanel('start');
}
function doLogout(){
  U=null;
  try{localStorage.removeItem('bock_session');}catch{}
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('lpw').value='';
  if(fbRef)fbRef.off();fbRef=null;fbReady=false;
  removeOfflineBanner();
}

    const offeneHW=db.bestellungen.filter(b=>b.typ==='metro'&&b.status==='offen');

          </div>
          <div style="background:white;color:var(--black);font-weight:700;font-size:13px;
            padding:8px 14px;border-radius:var(--rsm);white-space:nowrap">
            📬 Jetzt bestätigen
          </div>
        </div>`;
      });
    }
  }

  // TEMPORÄR AUSGEBLENDET – Kühlpläne in Bearbeitung
  // if(U!=='Verwaltung'){
  //   const datum=today();
  //   const schicht=getAktuelleSchicht();
  //   if(schicht){
  //     const key=kuehlKey(U,datum,schicht);
  //     const e=db.kuehltheke?db.kuehltheke[key]:null;

  //     if(!e||!e.abgeschlossen){
  //       html+=`<div class="banner banner-warn" ...>🌡️ Kühlpläne ausstehend</div>`;
  //     }else{
  //       html+=`<div class="banner banner-ok">🌡️ Kühlpläne ✅</div>`;
  //     }
  //   }
  // }

  // Freitags-Erinnerung
  if(!['Verwaltung','Backstube'].includes(U)){
    const today_dow=new Date().getDay();
    if(today_dow===5){
      const moISO=nextWeekMoISO();
      const frISO=nextWeekFrISO();
      const hatBaeko=db.bestellungen.some(b=>b.filiale===U&&(b.wocheMo===moISO||b.versanddatum===frISO)&&b.typ==='baeko');
      const hatHW=db.bestellungen.some(b=>b.filiale===U&&(b.wocheMo===moISO||b.versanddatum===frISO)&&b.typ==='metro');
      if(!hatBaeko||!hatHW){
        const missing=[];

          <div style="font-size:11px;opacity:.7;margin-top:3px">Woche ${nextWeekLabel()} · Jetzt bestellen →</div>
        </div>`;
      }
    }
  }

  div.innerHTML=html;

  checkBEx();

function checkBEx(){
  const al=document.getElementById('bal');if(!al)return;
  const frISO=nextWeekFrISO();
  const moISO=nextWeekMoISO();
  const ex=db.bestellungen.find(b=>b.filiale===U&&(b.wocheMo===moISO||b.versanddatum===frISO)&&b.typ==='baeko');
  if(ex){
    al.innerHTML=`<div class="banner banner-warn">⚠️ BÄKO für <strong>${nextWeekLabel()}</strong> bereits bestellt (${stlbl(ex.status)}). Erneut senden überschreibt.</div>`;
    ex.positionen.forEach(p=>{const el=document.getElementById('bq-'+p.id);if(el){el.value=p.menge;el.dataset.filled='1';}});
  }else al.innerHTML='';
}
function clearBQ(){(BAEKO[U]||[]).forEach(a=>{const el=document.getElementById('bq-'+a.id);if(el){el.value='';el.dataset.filled='';}});}
function submitBaeko(){
  const pos=[];
  (BAEKO[U]||[]).forEach(a=>{const el=document.getElementById('bq-'+a.id);const v=parseFloat(el?.value);if(el&&v>0)pos.push({id:a.id,name:a.name,menge:v});});
  if(!pos.length){toast('Bitte mind. einen Artikel eintragen.');return;}
  const btn=document.querySelector('[onclick="submitBaeko()"]');
  if(btn){btn.disabled=true;btn.textContent='⏳ Wird gesendet…';}
    const sigVal=document.getElementById('sig-name')?.value.trim()||'';
  const versandFr=nextWeekFrISO();const wocheMo=nextWeekMoISO();
  db.bestellungen=db.bestellungen.filter(b=>!(b.filiale===U&&b.wocheMo===wocheMo&&b.typ==='baeko'));
  db.bestellungen.push({id:uid(),filiale:U,versanddatum:versandFr,wocheMo,week:wocheMo,wocheLabel:nextWeekLabel(),datum:new Date().toISOString(),positionen:pos,
    status:'offen',typ:'baeko',sig:sigVal,fehlmengen:{},
    statusLog:[{status:'offen',datum:new Date().toISOString(),by:U}]});
  save();clearBQ();clearDraft('baeko');const sn=document.getElementById('sig-name');if(sn)sn.value='';toast('✅ BÄKO-Bestellung abgeschickt – Verwaltung bündelt und schickt an Bäko.');
  checkBEx();
}

      style="width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:14px;font-family:'Inter',sans-serif;background:white;outline:none;margin-top:4px">
    <div class="brow">
      <button class="btn btn-p" onclick="submitMetro()">✅ Metro-Bestellung absenden</button>
      <button class="btn btn-o" onclick="clearMQ()">↺ Zurücksetzen</button>
    </div></div>`;
  checkMEx();
}
function checkMEx(){
  const al=document.getElementById('mal');if(!al)return;
  const frISO=nextWeekFrISO();
  const moISOM=nextWeekMoISO();
  const ex=db.bestellungen.find(b=>b.filiale===U&&(b.wocheMo===moISOM||b.versanddatum===frISO)&&b.typ==='metro');
  if(ex){
    al.innerHTML=`<div class="banner banner-warn">⚠️ HANDELSWAREN für <strong>${nextWeekLabel()}</strong> bereits bestellt (${stlbl(ex.status)}).</div>`;
    ex.positionen.forEach(p=>{const el=document.getElementById('mq-'+p.id);if(el){el.value=p.menge;el.dataset.filled='1';}});
  }else al.innerHTML='';
}
function clearMQ(){METRO.forEach(a=>{const el=document.getElementById('mq-'+a.id);if(el){el.value='';el.dataset.filled='';}});}
function submitMetro(){
  const pos=[];
  (METRO[U]||[]).forEach(a=>{const el=document.getElementById('mq-'+a.id);const v=parseFloat(el?.value);if(el&&v>0)pos.push({id:a.id,name:a.name,kat:a.kat,vpe:a.vpe||'',menge:v});});
  if(!pos.length){toast('Bitte mind. einen Artikel eintragen.');return;}
  const sigValM=document.getElementById('sig-name')?.value.trim()||'';
  const freitextM=document.getElementById('metro-freitext')?.value.trim()||'';
  const versandFrM=nextWeekFrISO();const wocheMoM=nextWeekMoISO();
  db.bestellungen=db.bestellungen.filter(b=>!(b.filiale===U&&b.wocheMo===wocheMoM&&b.typ==='metro'));
  db.bestellungen.push({id:uid(),filiale:U,versanddatum:versandFrM,wocheMo:wocheMoM,week:wocheMoM,wocheLabel:nextWeekLabel(),datum:new Date().toISOString(),positionen:pos,
    status:'offen',typ:'metro',sig:sigValM,freitext:freitextM,fehlmengen:{},
    statusLog:[{status:'offen',datum:new Date().toISOString(),by:U}]});
  save();clearMQ();const smn=document.getElementById('sig-name');if(smn)smn.value='';const mft=document.getElementById('metro-freitext');if(mft)mft.value='';toast('✅ HANDELSWAREN-Bestellung abgeschickt!');
  checkMEx();
}

let sItems=[];

  const mc=document.getElementById('mc');

    <div class="ctitle">🎂 SONDERBESTELLUNG</div>
    <p style="font-size:13px;color:var(--light);margin-bottom:14px">Geht direkt an die Backstube. Täglich möglich.</p>
    <div class="sform">
      <label class="flbl">Datum</label><input type="date" id="sd" value="${today()}">
      <label class="flbl">Tour / Lieferhinweis</label><input type="text" id="st" placeholder="z.B. Tour 2 – Dienstag früh">
      <label class="flbl">Bestellung (Freitext)</label>
      <textarea id="stxt" placeholder="z.B. 30 Stück Croissant extra, Kundenname Müller…" style="min-height:120px"></textarea>
      <label class="flbl">Ihr Name</label>
      <input type="text" id="sname" placeholder="Ihren Namen eingeben" inputmode="text" autocomplete="name">
    </div>
    <div class="brow"><button class="btn btn-p" onclick="submitSonder()">📤 Sonderbestellung senden</button></div>
  </div>`;
  sItems=[];
}
function addSItem(){
  const sel=document.getElementById('ssel'),id=sel.value;if(!id)return;sel.value='';
  const allArts=[...(BAEKO[U]||[]),...METRO];
  const a=allArts.find(x=>x.id===id);if(!a)return;
  if(sItems.find(s=>s.id===id)){toast('Bereits hinzugefügt.');return;}
  sItems.push({id:a.id,name:a.name,menge:1});renderSItems();
}
function renderSItems(){
  const l=document.getElementById('slist');if(!l)return;
  if(!sItems.length){l.innerHTML='';return;}
  l.innerHTML=sItems.map((s,i)=>`<div class="orow" style="margin-bottom:5px">
    <div class="aname">${s.name}</div>
    <input class="qinp" type="number" min="1" value="${s.menge}" oninput="sItems[${i}].menge=parseFloat(this.value)||1">
    <button class="btn btn-o btn-sm" onclick="sItems.splice(${i},1);renderSItems()">✕</button>
  </div>`).join('');
}
function submitSonder(){
  const datum=document.getElementById('sd')?.value,text=document.getElementById('stxt')?.value.trim();
  const name=document.getElementById('sname')?.value.trim(),tour=document.getElementById('st')?.value.trim();
  if(!datum){toast('Datum angeben.');return;}
  if(!name){toast('Bitte Namen eintragen.');return;}
  if(!text){toast('Bitte Bestellung eintragen.');return;}
  db.sonder.push({id:uid(),filiale:U,datum,tour,text,name,artikel:[],status:'offen',erstellt:new Date().toISOString()});
  save();toast('⭐ Sonderbestellung gesendet!');renderSonder();
}

// ═══════════════════ BESTELLHISTORIE ═══════════════════
function renderBestellhistorie(){
  const mc=document.getElementById('mc');
  const isAll=U==='Verwaltung'||U==='Backstube';
  const filOpts=isAll?ALLE_FIL.map(f=>`<option value="${f}">${f}</option>`).join(''):'';
  mc.innerHTML=`<div class="card">
    <div class="ctitle">BESTELLHISTORIE</div>
    <p style="font-size:12px;color:var(--light);margin-bottom:12px">Wann · Von wem · Was bestellt</p>
    <div class="frow">
      <input type="date" id="hw" placeholder="Datum filtern" oninput="refreshHist()">
      ${isAll?`<select id="hfil" onchange="refreshHist()"><option value="">Alle Filialen</option>${filOpts}</select>`:''}
      
      <select id="hst" onchange="refreshHist()"><option value="">Alle Status</option><option value="offen">Offen</option><option value="versendet">Versendet</option><option value="angekommen">Angekommen</option><option value="bestaetigt">Bestätigt</option></select>
    </div>
    <div id="hlist"></div>
  </div>`;
  refreshHist();
}
function refreshHist(){
  const datFilter=document.getElementById('hw')?.value||'';
  const fil=document.getElementById('hfil')?.value||'';
  const st=document.getElementById('hst')?.value||'';
  const list=document.getElementById('hlist');if(!list)return;

  // Bäko + HW Bestellungen
  let orders=db.bestellungen.filter(b=>{
    if(U!=='Verwaltung'&&U!=='Backstube'&&b.filiale!==U)return false;
    if(datFilter&&b.versanddatum!==datFilter&&b.datum.slice(0,10)!==datFilter)return false;
    if(fil&&b.filiale!==fil)return false;
    if(st&&b.status!==st)return false;
    return true;
  });

  // Sonderbestellungen
  let sonders=db.sonder.filter(s=>{
    if(U!=='Verwaltung'&&U!=='Backstube'&&s.filiale!==U)return false;
    if(datFilter&&s.datum!==datFilter&&s.erstellt.slice(0,10)!==datFilter)return false;
    if(fil&&s.filiale!==fil)return false;
    if(st&&s.status!==st)return false;
    return true;
  });

  // Alles zusammen nach Datum sortiert
  const combined=[
    ...orders.map(o=>({...o,_art:'bestellung'})),
    ...sonders.map(s=>({...s,_art:'sonder',datum:s.erstellt}))
  ].sort((a,b)=>b.datum.localeCompare(a.datum));

  if(!combined.length){list.innerHTML='<p style="color:var(--light);font-size:13px">Keine Einträge gefunden.</p>';return;}

  list.innerHTML=combined.map(item=>{
    if(item._art==='sonder'){
      return`<div class="hitem">
        <div class="hhead" onclick="th(this)">
          <div>
            <strong>${fname(item.filiale)}</strong> · 🎂 SONDERBESTELLUNG · ${item.datum}
            <div style="font-size:11px;color:var(--light);margin-top:2px">📅 ${dts(item.erstellt)} · ${item.name||''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:7px">
            <span class="st ${stcls(item.status)}">${stlbl(item.status)}</span>
            <span style="color:var(--xlight)">›</span>
          </div>
        </div>
        <div class="hbody">
          ${item.text?`<p style="font-size:13px;margin-bottom:8px">${item.text}</p>`:''}
          ${item.tour?`<p style="font-size:12px;color:var(--light)">Tour: ${item.tour}</p>`:''}
          ${(U==='Verwaltung'||U==='Backstube')?`<div class="brow"><button class="btn btn-o btn-sm" onclick="printLZ('${item.id}')">🖨️ Laufzettel</button></div>`:''}
        </div>
      </div>`;
    }
    const o=item;
    const isBaeko=o.typ==='baeko';
    const fehlCount=o.fehlmengen?Object.values(o.fehlmengen).filter(v=>v>0).length:0;
    return`<div class="hitem">
      <div class="hhead" onclick="th(this)">
        <div>
          <strong>${fname(o.filiale)}</strong> · ${isBaeko?'🌾 BÄKO':'📦 HANDELSWAREN'} · ${o.wocheLabel||o.versanddatum||o.week}
          <div style="font-size:11px;color:var(--light);margin-top:2px">📅 ${dts(o.datum)}${o.sig?' · '+o.sig:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:7px">
          ${o.hatAbweichung?`<span class="st" style="background:var(--red-lt);color:var(--red)">⚠️ Abweichung</span>`:fehlCount?`<span class="st st-teilweise">⚠️ ${fehlCount} Fehlmenge(n)</span>`:''}
          <span class="st ${stcls(o.status)}">${stlbl(o.status)}</span>
          ${o.status==='versendet'&&o.filiale===U&&o.typ==='metro'?`<button class="btn btn-g btn-sm no-print" onclick="event.stopPropagation();openAngekommenModal('${o.id}')">📬 Lieferung bestätigen</button>`:''}
          <span style="color:var(--xlight)">›</span>
        </div>
      </div>
      <div class="hbody">
        ${ordTbl(o)}
        ${fehlCount?fehlTbl(o):''}
        ${o.statusLog?`<div class="slbl" style="margin-top:12px">Status-Verlauf</div><div class="tline">${o.statusLog.map(h=>`<div class="tli"><div class="tld">${dts(h.datum)} · ${h.by}</div><span class="st ${stcls(h.status)}">${stlbl(h.status)}</span></div>`).join('')}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function ordTbl(o){
  const hatAnkunft=o.positionen&&o.positionen.some(p=>p.angekommen!==undefined);
  const hatFehl=o.fehlmengen&&Object.keys(o.fehlmengen).length>0;
  return`<div class="twrap"><table><thead><tr>
    <th>Artikel</th><th>Bestellt</th>
    ${hatFehl?'<th>Gepackt</th><th>Fehlt</th>':''}
    ${hatAnkunft?'<th>Angekommen</th><th>Diff</th>':''}
    </tr></thead>
    <tbody>${o.positionen.map(p=>{
      const gepackt=hatFehl&&o.fehlmengen[p.id]!==undefined?(p.menge-(o.fehlmengen[p.id]||0)):null;
      const fehlt=hatFehl&&o.fehlmengen[p.id]>0?o.fehlmengen[p.id]:0;
      const ang=p.angekommen!==undefined?p.angekommen:null;
      const diff=ang!==null?ang-p.menge:null;
      const hasAbw=diff!==null&&diff!==0;
      return`<tr style="${hasAbw?'background:var(--red-lt)':fehlt?'background:var(--amber-lt)':''}">
        <td>${p.name}</td><td>${p.menge}</td>
        ${hatFehl?`<td>${gepackt!==null?gepackt:'–'}</td><td style="color:${fehlt?'var(--red)':'var(--green)'};font-weight:600">${fehlt>0?'−'+fehlt:'✓'}</td>`:''}
        ${hatAnkunft?`<td style="font-weight:${hasAbw?700:400}">${ang!==null?ang:'–'}</td>
          <td style="color:${hasAbw?(diff<0?'var(--red)':'var(--amber)'):'var(--green)'};font-weight:700">
            ${diff!==null?(diff===0?'✓':(diff>0?'+':'')+diff):'–'}
          </td>`:''}
      </tr>`;
    }).join('')}</tbody></table></div>
    ${o.freitext?`<div style="margin-top:8px;padding:8px 10px;background:var(--cream);border-radius:var(--rsm);font-size:12px">📝 Sonstige Artikel: ${o.freitext}</div>`:''}
    ${o.ankunftKommentar?`<div style="margin-top:8px;padding:8px 10px;background:var(--amber-lt);border-radius:var(--rsm);font-size:12px">💬 ${o.ankunftKommentar}</div>`:''}
    ${o.hatAbweichung?`<div class="banner banner-red" style="margin-top:8px">⚠️ Abweichungen bei dieser Lieferung gemeldet</div>`:''}`;
}

function fehlTbl(o){
  const fehler=Object.entries(o.fehlmengen).filter(([k,v])=>v>0);
  if(!fehler.length)return'';
  return`<div class="banner banner-red" style="margin-top:10px">⚠️ Offene Fehlmengen: ${fehler.map(([id,v])=>{
    const p=o.positionen.find(x=>x.id===id);return(p?.name||id)+': −'+v;
  }).join(', ')}</div>`;
}
function confirmArr(id){
  const o=db.bestellungen.find(x=>x.id===id);if(!o)return;
  o.status='angekommen';if(!o.statusLog)o.statusLog=[];
  o.statusLog.push({status:'angekommen',datum:new Date().toISOString(),by:U});
  save();refreshHist();toast('📬 Als angekommen markiert!');
}

// ═══════════════════ PACKEN MODAL (B1) ═══════════════════
function openPackenModal(orderId){
  const o=db.bestellungen.find(x=>x.id===orderId);if(!o)return;
  const rows=o.positionen.map(p=>{
    const fehlend=o.fehlmengen&&o.fehlmengen[p.id]>0;
    return`<div class="pack-row${fehlend?' fehlend':''}">
      <div><div style="font-weight:500;font-size:13px">${p.name}</div>
        ${fehlend?`<div style="font-size:11px;color:var(--red)">Noch fehlend: ${o.fehlmengen[p.id]}</div>`:''}
      </div>
      <div style="text-align:center;font-size:13px;color:var(--mid)">${p.menge}</div>
      <input class="pack-inp" type="number" min="0" max="${p.menge}" value="${o.fehlmengen&&o.fehlmengen[p.id]!==undefined?p.menge-(o.fehlmengen[p.id]||0):p.menge}" id="pk-${p.id}" placeholder="${p.menge}">
    </div>`;
  }).join('');
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">📦 Packen – ${fname(o.filiale)} · ${o.typ==='baeko'?'🌾 BÄKO':'HANDELSWAREN'} · Versand ${o.versanddatum?new Date(o.versanddatum).toLocaleDateString('de-DE'):o.week}</div>
        <div style="display:grid;grid-template-columns:1fr 70px 70px;gap:8px;padding:6px 10px;font-size:11px;font-weight:700;color:var(--light);text-transform:uppercase">
          <div>Artikel</div><div style="text-align:center">Bestellt</div><div style="text-align:center">Gepackt</div>
        </div>
        ${rows}
        <p style="font-size:12px;color:var(--light);margin-top:10px">Gepackte Menge eintragen. Fehlmengen bleiben als offene Position bestehen.</p>
        <div class="brow" style="margin-top:14px">
          <button class="btn btn-p" onclick="submitPacken('${orderId}')">✅ Versand bestätigen</button>
          <button class="btn btn-o" onclick="closeModal()">Abbrechen</button>
        </div>
      </div>
    </div>`;
}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function submitPacken(orderId){
  const o=db.bestellungen.find(x=>x.id===orderId);if(!o)return;
  const fehlmengen={};let hatFehler=false;
  o.positionen.forEach(p=>{
    const el=document.getElementById('pk-'+p.id);
    const gepackt=el?parseFloat(el.value)||0:p.menge;
    const fehlt=Math.max(0,p.menge-gepackt);
    if(fehlt>0){fehlmengen[p.id]=fehlt;hatFehler=true;}
    else fehlmengen[p.id]=0;
  });
  o.fehlmengen=fehlmengen;
  o.status=hatFehler?'teilweise':'versendet';
  if(!o.statusLog)o.statusLog=[];
  o.statusLog.push({status:o.status,datum:new Date().toISOString(),by:U,
    note:hatFehler?'Teilweise versendet – Fehlmengen offen':'Vollständig versendet'});
  save();closeModal();
  if(hatFehler){
    const fehlerListe=Object.entries(fehlmengen).filter(([k,v])=>v>0)
      .map(([id,v])=>{const p=o.positionen.find(x=>x.id===id);return(p?.name||id)+': −'+v;}).join(', ');
    toast('⚠️ Teilweise versendet. Fehlmengen: '+fehlerListe);
  }else toast('✅ Vollständig versendet!');
  renderVwBest();updateStartBanner();
}

function refVwB(){
  const w=document.getElementById('vbw')?.value||'',f=document.getElementById('vbf')?.value||'';

    if(t&&b.typ!==t)return false;if(s&&b.status!==s)return false;return true;
  }).sort((a,b)=>b.datum.localeCompare(a.datum));
  if(!orders.length){list.innerHTML='<p style="color:var(--light);font-size:13px">Keine Bestellungen.</p>';return;}
  list.innerHTML=orders.map(o=>{
    const fehlCount=o.fehlmengen?Object.values(o.fehlmengen).filter(v=>v>0).length:0;
    return`<div class="hitem">
      <div class="hhead" onclick="th(this)">
        <div>
          <strong>${fname(o.filiale)}</strong> · ${o.typ==='baeko'?'🌾 BÄKO':'HANDELSWAREN'} · Versand ${o.versanddatum?new Date(o.versanddatum).toLocaleDateString('de-DE'):o.week} · ${o.positionen.length} Pos.
          <div style="font-size:11px;color:var(--light);margin-top:2px">${dts(o.datum)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:7px">
          ${fehlCount?`<span class="st st-teilweise">⚠️ ${fehlCount} Fehl.</span>`:''}<span class="st ${stcls(o.status)}">${stlbl(o.status)}</span>
          ${(U==='B1'&&o.typ==='metro'&&o.status==='offen')?`<button class="btn btn-p btn-sm no-print" onclick="event.stopPropagation();openPackenModal('${o.id}')">📦 Packen</button>`:''}
          ${(U==='B1'&&o.typ==='metro'&&o.status==='teilweise')?`<button class="btn btn-p btn-sm no-print" onclick="event.stopPropagation();openPackenModal('${o.id}')">⚠️ Fehlmengen</button>`:''}
          <span style="color:var(--xlight)">›</span>
        </div>
      </div>
      <div class="hbody">
        ${ordTbl(o)}
        ${fehlCount?fehlTbl(o):''}
        <div class="brow no-print">
          ${U==='Verwaltung'?`<select style="font-size:12px;padding:5px 9px;border:1.5px solid var(--border);border-radius:var(--rsm);background:white"
            onchange="setOSt('${o.id}',this.value,refVwB);this.value=''">
            <option value="">Status ändern…</option>
            <option value="offen">Offen</option><option value="gepackt">Gepackt</option>
            <option value="versendet">Versendet</option><option value="angekommen">Angekommen</option>
            <option value="bestaetigt">Bestätigt</option>
          </select>
          ${o.typ==='baeko'?`<button class="btn btn-o btn-sm" onclick="event.stopPropagation();openBaekoEdit('${o.id}')">✏️ Bearbeiten</button>`:''}`:''}
        </div>
      </div>
    </div>`;

function setOSt(id,st,cb){
  const o=db.bestellungen.find(x=>x.id===id);if(!o||!st)return;
  // Lagerabzug bei "gepackt" für HW-Bestellungen
  if(st==='gepackt'&&o.status!=='gepackt'&&o.typ==='metro'){
    // Explizites Mapping HW-Artikelname → Lager-ID
    const HW_LAGER_MAP=[
      // Kaffee
      {keywords:['cafe crema','crema'],lagerId:'k01'},
      {keywords:['espresso'],lagerId:'k02'},
      {keywords:['koffeinf','koffeinfrei'],lagerId:'k03'},
      // Tee
      {keywords:['apfeltee'],lagerId:'t01'},
      {keywords:['beerenzauber'],lagerId:'t02'},
      {keywords:['black chai'],lagerId:'t03'},
      {keywords:['china gunpowder','gunpowder'],lagerId:'t04'},
      {keywords:['darjeeling'],lagerId:'t05'},
      {keywords:['earl grey'],lagerId:'t06'},
      {keywords:['ingwer lemon','ingwer'],lagerId:'t07'},
      {keywords:['jasmintee','jasmin'],lagerId:'t08'},
      {keywords:['kamille'],lagerId:'t09'},
      {keywords:['pfefferminze'],lagerId:'t10'},
      {keywords:['rotbusch'],lagerId:'t11'},
      // Verpackung
      {keywords:['pappteller 11','pappteller 11x'],lagerId:'lv01'},
      {keywords:['pappteller 13','pappteller 13x'],lagerId:'lv02'},
      {keywords:['pappteller 16','pappteller 16x'],lagerId:'lv03'},
      {keywords:['to go becher','togo becher','becher'],lagerId:'lv04'},
    ];
    o.positionen.forEach(p=>{
      const pName=p.name.toLowerCase();
      const mapping=HW_LAGER_MAP.find(m=>m.keywords.some(k=>pName.includes(k)));
      if(mapping&&db.lager[mapping.lagerId]){
        const lagerArt=LAGER_ART.find(a=>a.id===mapping.lagerId);
        const vor=db.lager[mapping.lagerId].menge;
        db.lager[mapping.lagerId].menge=Math.max(0,vor-p.menge);
        db.lagerLog.push({
          datum:new Date().toISOString(),
          art:lagerArt?.name||mapping.lagerId,
          vor,nach:db.lager[mapping.lagerId].menge,
          grund:`HW gepackt für ${o.filiale}`,by:U
        });
      }
    });
  }
  o.status=st;if(!o.statusLog)o.statusLog=[];
  o.statusLog.push({status:st,datum:new Date().toISOString(),by:U});
  save();toast(`Status: ${stlbl(st)}`);if(cb)cb();
}

function renderLager(){

  const warns=LAGER_ART.filter(a=>db.lager[a.id].menge<db.lager[a.id].min);
  const wHtml=warns.map(a=>`<div class="banner banner-red">⚠️ ${a.name}: ${db.lager[a.id].menge} ${a.unit} (Min: ${a.min})</div>`).join('');
  const kats=[...new Set(LAGER_ART.map(a=>a.kat||'Sonstiges'))];
  const grid=kats.map(kat=>{
    const katArts=LAGER_ART.filter(a=>(a.kat||'Sonstiges')===kat);

      return`<div class="litem ${cls}">${badge?`<div class="lwbadge">${badge}</div>`:''}
        <div class="lname">${a.name}</div><div class="lqty">${l.menge}</div><div class="lunit">${a.unit} · Min: ${l.min}</div>
        ${canEdit?`<div style="display:flex;flex-direction:column;gap:4px;margin-top:8px">
        <input type="number" id="le-${a.id}" placeholder="Neuer Bestand" style="padding:5px 7px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:'Inter',sans-serif">
        <input type="text" id="lg-${a.id}" placeholder="Grund (z.B. Lieferung)" style="padding:5px 7px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:'Inter',sans-serif">

        </div>
      </div>`:''}
      </div>`;
    }).join('');
  }).join('');
  const logs=db.lagerLog.slice(-15).reverse().map(h=>`<tr>
    <td style="font-size:11px">${new Date(h.datum).toLocaleString('de-DE')}</td>
    <td>${h.art}</td><td>${h.vor}</td><td>${h.nach}</td>
    <td style="font-size:11px">${h.grund}</td></tr>`).join('');
  mc.innerHTML=`<div class="card"><div class="ctitle">🏪 Lagerbestand</div>
    ${wHtml}<div class="lgrid">${grid}</div>
    ${logs?`<hr class="div"><div class="slbl">Letzte Lagerbewegungen</div><div class="twrap"><table>
    <thead><tr><th>Datum</th><th>Artikel</th><th>Vorher</th><th>Nachher</th><th>Grund</th></tr></thead>
    <tbody>${logs}</tbody></table></div>`:''}
  </div>`;
}
function updL(id){
  const el=document.getElementById('le-'+id);

  const nmEl=document.getElementById('ln-'+id);
  const val=parseFloat(el.value);if(isNaN(val)){toast('Bitte Menge eingeben.');return;}
  const grund=grEl?.value.trim()||'';if(!grund){toast('Bitte Grund angeben.');return;}
  const name=nmEl?.value.trim()||'';if(!name){toast('Bitte Namen eintragen.');return;}
  const a=LAGER_ART.find(x=>x.id===id);const vor=db.lager[id]?.menge||0;
  if(!db.lager[id])db.lager[id]={menge:0,min:a?.min||0};
  db.lager[id].menge=val;
  db.lagerLog.push({datum:new Date().toISOString(),art:a?.name||id,vor,nach:val,grund,by:name});

function calcD(id){
  const el=document.getElementById('ii-'+id);const ist=parseFloat(el.value);
  const soll=db.lager[id]?.menge||0;const dd=document.getElementById('id-'+id);if(!dd)return;
  if(isNaN(ist)){dd.textContent='–';dd.className='';return;}
  const d=ist-soll;dd.textContent=(d>=0?'+':'')+d;dd.className=d>0?'dpos':d<0?'dneg':'';
}
function submitInv(){
  const mon=document.getElementById('imon')?.value,per=document.getElementById('iperson')?.value.trim();
  if(!mon){toast('Monat angeben.');return;}if(!per){toast('Name eintragen.');return;}
  const pos=[];
  LAGER_ART.forEach(a=>{
    const el=document.getElementById('ii-'+a.id);
    if(el&&el.value!==''){
      const ist=parseFloat(el.value),soll=db.lager[a.id]?.menge||0;
      pos.push({id:a.id,name:a.name,unit:a.unit,soll,ist,diff:ist-soll});
      db.lagerLog.push({datum:new Date().toISOString(),art:a.name,vor:soll,nach:ist,grund:`Inventur ${mon} · ${per}`,by:U});
      if(db.lager[a.id])db.lager[a.id].menge=ist;
    }
  });
  if(!pos.length){toast('Mind. einen Ist-Wert eintragen.');return;}
  db.inventuren.push({id:uid(),monat:mon,person:per,datum:new Date().toISOString(),positionen:pos,ersteller:U});
  save();toast('✅ Inventur gespeichert!');renderInventur();
}

let _dragSrcIdx=null;
function artDragStart(e){
  _dragSrcIdx=parseInt(e.currentTarget.dataset.idx);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function artDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function artDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function artDrop(e,type){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const targetIdx=parseInt(e.currentTarget.dataset.idx);
  const fil=e.currentTarget.dataset.fil;
  if(_dragSrcIdx===null||_dragSrcIdx===targetIdx)return;
  const list=type==='baeko'?BAEKO[fil]:METRO[fil];
  if(!list)return;
  const moved=list.splice(_dragSrcIdx,1)[0];
  list.splice(targetIdx,0,moved);
  _dragSrcIdx=null;
  showSaveBar();
  if(type==='baeko')renderBaekoArtList();
  else renderMetroArtList();
  toast('Reihenfolge geändert – bitte speichern.');
}

function renderBaekoArtList(){
  const fil=document.getElementById('art-fil')?.value||ALLE_FIL[0];

  const KATS=['Frischwaren','Getränke','Backwaren & Zutaten','Verpackung','Reinigung'];
  const grouped=KATS.map(kat=>({kat,items:arts.filter(a=>(a.kat||'Backwaren & Zutaten')===kat)}))
    .filter(g=>g.items.length>0);

  if(ungrouped.length)grouped.push({kat:'Sonstiges',items:ungrouped});

  div.innerHTML=grouped.map(({kat,items})=>
    `<div class="slbl" style="font-size:12px;font-weight:700;margin-top:12px;color:var(--dark)">${kat}</div>`+
    items.map(a=>{

let sigOn=false,sigDraw=false,sigCtx=null;
function activateSig(){
  const ca=document.getElementById('sig-canvas'),ar=document.getElementById('sig-area'),ct=document.getElementById('sigctrl');
  ar.style.display='none';ca.style.display='block';ct.classList.add('vis');
  ca.width=ca.offsetWidth;ca.height=90;
  sigCtx=ca.getContext('2d');sigCtx.strokeStyle='#0a0a0a';sigCtx.lineWidth=2;sigCtx.lineCap='round';sigOn=true;
  function gp(e){const r=ca.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
  ca.onmousedown=e=>{sigDraw=true;sigCtx.beginPath();const p=gp(e);sigCtx.moveTo(p.x,p.y);};
  ca.onmousemove=e=>{if(!sigDraw)return;const p=gp(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();};
  ca.onmouseup=()=>sigDraw=false;
  ca.addEventListener('touchstart',e=>{e.preventDefault();sigDraw=true;sigCtx.beginPath();const p=gp(e);sigCtx.moveTo(p.x,p.y);},{passive:false});
  ca.addEventListener('touchmove',e=>{e.preventDefault();if(!sigDraw)return;const p=gp(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();},{passive:false});
  ca.addEventListener('touchend',()=>sigDraw=false);
}
function clearSig(){
  const ca=document.getElementById('sig-canvas'),ar=document.getElementById('sig-area'),ct=document.getElementById('sigctrl');
  if(sigCtx)sigCtx.clearRect(0,0,ca.width,ca.height);
  if(ca)ca.style.display='none';if(ct)ct.classList.remove('vis');if(ar)ar.style.display='flex';sigOn=false;
}
function getSig(){const el=document.getElementById('sig-name');return el?.value.trim()||null;}

function printBaeko(){
  const wMo=document.getElementById('pdf-woche')?.value||nextWeekMoISO();
  // Bestellungen dieser Woche finden – Vergleich auf wocheMo oder week (beide = Montag-ISO)
  const orders=db.bestellungen.filter(b=>b.typ==='baeko'&&(b.wocheMo===wMo||b.week===wMo));
  if(!orders.length){toast('Keine Bäko-Bestellungen für diese Woche.');return;}

  const {jsPDF}=window.jspdf;
  if(!jsPDF){toast('PDF-Bibliothek noch nicht geladen – bitte kurz warten.');return;}

  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const wLabel=orders[0]?.wocheLabel||w;
  const datum=new Date().toLocaleDateString('de-DE');

  // Header
  doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('Bäcker Bock – BÄKO-Bestellung',14,18);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text(`Woche: ${wLabel}   ·   Erstellt: ${datum} von ${U}`,14,25);
  doc.line(14,28,196,28);

  let y=35;
  orders.forEach(o=>{
    if(y>260){doc.addPage();y=20;}
    doc.setFontSize(11);doc.setFont('helvetica','bold');
    doc.text(fname(o.filiale),14,y);y+=2;
    doc.autoTable({
      startY:y,
      head:[['Art.-Nr.','Artikel','Menge']],
      body:o.positionen.map(p=>[p.id,p.name,String(p.menge)]),
      styles:{fontSize:9,cellPadding:2},
      headStyles:{fillColor:[10,10,10],textColor:255,fontStyle:'bold'},
      columnStyles:{0:{cellWidth:28},2:{cellWidth:18,halign:'center'}},
      margin:{left:14,right:14},
      theme:'grid',
    });
    y=doc.lastAutoTable.finalY+8;
  });

  // Unterschrift
  if(y>250){doc.addPage();y=20;}
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text('Unterschrift: ___________________________',14,y+10);

  // PDF herunterladen
  const filename=`Baeko_${wLabel.replace(/[^0-9.]/g,'_')}.pdf`;
  doc.save(filename);

  // mailto öffnen
  const betreff=encodeURIComponent(`BÄKO-Bestellung Woche ${wLabel}`);
  const body=encodeURIComponent(`Hallo,\n\nanbei die BÄKO-Bestellung für die Woche ${wLabel}.\n\nFreundliche Grüße\nBäcker Bock`);

    window.location.href=`mailto:Michaela.Lauer@baeko-franken.de?subject=${betreff}&body=${body}`;

  toast('✅ PDF heruntergeladen – Mail-Client wird geöffnet.');

// Spätschicht 12-18: Kühltheke 16, Kühlschrank 16, Sahnemaschine 16

const KUEHL_ITEMS = [
  {id:'kt', name:'Kühltheke', zeiten_frueh:['10:00','12:00'], zeiten_spaet:['16:00']},
  {id:'ks', name:'Kühlschrank', zeiten_frueh:['08:00'], zeiten_spaet:['16:00']},
  {id:'sm', name:'Sahnemaschine', zeiten_frueh:['08:00'], zeiten_spaet:['16:00']},
];

const SCHICHTEN = [
  {id:'frueh', name:'Frühschicht', von:'06:00', bis:'12:00', zeiten:['08:00','10:00','12:00']},
  {id:'spaet', name:'Spätschicht', von:'12:00', bis:'18:00', zeiten:['12:00','16:00']},
];

function getAktuelleSchicht(){
  const h=new Date().getHours();
  if(h>=6&&h<12) return 'frueh';
  if(h>=12&&h<18) return 'spaet';
  return null;
}

function kuehlKey(fil,datum,schicht){return `${fil}_${datum}_${schicht}`;}

function renderKuehltheke(){
  const mc=document.getElementById('mc');
  const datum=today();
  const schicht=getAktuelleSchicht();
  const schichtObj=schicht?SCHICHTEN.find(s=>s.id===schicht):null;
  if(!db.kuehltheke)db.kuehltheke={};
  const key=kuehlKey(U,datum,schicht||'manual');
  if(!db.kuehltheke[key])db.kuehltheke[key]={messungen:{}};
  const eintrag=db.kuehltheke[key];

  const schichtBanner=schicht?
    `<div class="banner banner-info">🕐 ${schichtObj.name} (${schichtObj.von}–${schichtObj.bis}) · ${new Date().toLocaleDateString('de-DE')}</div>`:
    `<div class="banner banner-warn">⚠️ Aktuell keine aktive Schicht. Manuelle Eingabe möglich.</div>`;

  // Baue Messfelder: pro Gerät + Zeit = Temp-Feld + Name-Feld
  const rows=KUEHL_ITEMS.map(item=>{
    const zeiten=schicht==='frueh'?item.zeiten_frueh:schicht==='spaet'?item.zeiten_spaet:[...item.zeiten_frueh,...item.zeiten_spaet];
    return `<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rsm);padding:14px;margin-bottom:10px">
      <div style="font-weight:600;font-size:14px;margin-bottom:12px">${item.name}</div>
      ${zeiten.map(zeit=>{
        const mKey=item.id+'_'+zeit;
        const m=eintrag.messungen[mKey]||{temp:'',name:''};
        const done=m.temp!==''&&m.name!=='';
        return `<div style="display:grid;grid-template-columns:80px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;padding:8px;background:${done?'var(--green-lt)':'white'};border-radius:var(--rsm);border:1.5px solid ${done?'var(--green)':'var(--border)'}">
          <div style="font-weight:600;font-size:13px;text-align:center">${zeit}</div>
          <div>
            <div class="flbl" style="margin-bottom:3px">Temperatur</div>
            <input type="number" step="0.1" value="${m.temp}"
              placeholder="°C"
              style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:14px;font-family:'Inter',sans-serif;text-align:center"
              oninput="saveMessung('${key}','${mKey}','temp',this.value)">
          </div>
          <div>
            <div class="flbl" style="margin-bottom:3px">Name</div>
            <input type="text" value="${m.name}"
              placeholder="Wer hat gemessen?"
              style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:14px;font-family:'Inter',sans-serif"
              oninput="saveMessung('${key}','${mKey}','name',this.value)">
          </div>
          <div style="font-size:20px;margin-top:18px">${done?'✅':'○'}</div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  // Prüfe ob alle Felder ausgefüllt
  const allZeiten=KUEHL_ITEMS.flatMap(item=>
    (schicht==='frueh'?item.zeiten_frueh:schicht==='spaet'?item.zeiten_spaet:[...item.zeiten_frueh,...item.zeiten_spaet])
    .map(z=>item.id+'_'+z)
  );
  const alleAusgefuellt=allZeiten.every(k=>{const m=eintrag.messungen[k];return m&&m.temp!==''&&m.name!=='';});
  const istAbgeschlossen=eintrag.abgeschlossen||false;

  mc.innerHTML=`<div class="card">
    <div class="ctitle">🌡️ KÜHLPLÄNE</div>
    ${schichtBanner}
    ${istAbgeschlossen?`<div class="banner banner-ok">✅ Schicht abgeschlossen um ${eintrag.zeitpunkt?new Date(eintrag.zeitpunkt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}):''} Uhr</div>`:''}
    ${rows}
    <div class="brow">
      ${!istAbgeschlossen&&alleAusgefuellt?`<button class="btn btn-p" onclick="abschliessenKuehl('${key}')">✅ Schicht abschließen</button>`:''}
      ${!istAbgeschlossen&&!alleAusgefuellt?`<div style="font-size:12px;color:var(--light);padding:8px">Alle Felder ausfüllen um Schicht abzuschließen.</div>`:''}
      ${U==='Verwaltung'?`<button class="btn btn-o" onclick="printKuehl('${key}','${datum}','${schicht||'manual'}')">🖨️ Drucken</button>`:''}
    </div>
  </div>`;
}

function saveMessung(key,mKey,field,val){
  if(!db.kuehltheke)db.kuehltheke={};
  if(!db.kuehltheke[key])db.kuehltheke[key]={messungen:{}};
  if(!db.kuehltheke[key].messungen[mKey])db.kuehltheke[key].messungen[mKey]={temp:'',name:''};
  db.kuehltheke[key].messungen[mKey][field]=val;
  saveKuehlDB();
  // Live-Update Checkbox
  const allZeiten=KUEHL_ITEMS.flatMap(item=>{
    const schicht=getAktuelleSchicht();
    return(schicht==='frueh'?item.zeiten_frueh:schicht==='spaet'?item.zeiten_spaet:[...item.zeiten_frueh,...item.zeiten_spaet]).map(z=>item.id+'_'+z);
  });
  const alleAusgefuellt=allZeiten.every(k=>{const m=db.kuehltheke[key].messungen[k];return m&&m.temp!==''&&m.name!=='';});
}

function abschliessenKuehl(key){
  if(!db.kuehltheke[key])return;
  db.kuehltheke[key].abgeschlossen=true;
  db.kuehltheke[key].zeitpunkt=new Date().toISOString();
  saveKuehlDB();toast('✅ Schicht abgeschlossen.');renderKuehltheke();updateStartBanner();
}
function saveKuehlDB(){
  if(fbReady&&fbRef){
    fbRef.child('kuehltheke').set(db.kuehltheke).catch(e=>console.error(e));
  }else{
    try{localStorage.setItem('bock_db',JSON.stringify(db));}catch{}
  }
}

function renderVwKuehltheke(){
  const mc=document.getElementById('mc');
  if(!db.kuehltheke){mc.innerHTML='<div class="card"><div class="ctitle">🌡️ Alle Kühltheken</div><p style="color:var(--light)">Keine Einträge.</p></div>';return;}
  const filOpts=ALLE_FIL.map(f=>`<option value="${f}">${f}</option>`).join('');
  mc.innerHTML=`<div class="card">
    <div class="ctitle">🌡️ Alle Kühlpläne</div>
    <div class="frow">
      <input type="date" id="vk-datum" value="${today()}" oninput="refreshVwKuehl()">
      <select id="vk-fil" onchange="refreshVwKuehl()"><option value="">Alle Filialen</option>${filOpts}</select>
    </div>
    <div id="vk-list"></div>
  </div>`;
  refreshVwKuehl();
}

function refreshVwKuehl(){
  const datum=document.getElementById('vk-datum')?.value||today();
  const fil=document.getElementById('vk-fil')?.value||'';
  const list=document.getElementById('vk-list');if(!list)return;
  if(!db.kuehltheke){list.innerHTML='<p style="color:var(--light)">Keine Einträge.</p>';return;}

  const filialen=fil?[fil]:ALLE_FIL;
  const schichten=['frueh','spaet'];
  let html='';

  filialen.forEach(f=>{
    html+=`<div class="slbl">${f}</div>`;
    let hatEintrag=false;
    schichten.forEach(s=>{
      const key=kuehlKey(f,datum,s);
      const e=db.kuehltheke[key];
      if(!e)return;
      hatEintrag=true;
      const sObj=SCHICHTEN.find(x=>x.id===s);
      html+=`<div class="hitem" style="margin-bottom:6px">
        <div class="hhead" onclick="th(this)">
          <div><strong>${sObj?.name||s}</strong> · ${f} · ${datum}</div>
          <div style="display:flex;align-items:center;gap:6px">
            ${e.abgeschlossen?`<span class="st st-bestaetigt">✅ Abgeschlossen · ${e.name}</span>`:`<span class="st st-offen">Offen</span>`}
            <span style="color:var(--xlight)">›</span>
          </div>
        </div>
        <div class="hbody">
          <div class="twrap"><table><thead><tr><th>Gerät</th><th>Zeit</th><th>Temperatur</th><th>Name</th></tr></thead>
          <tbody>${KUEHL_ITEMS.map(item=>{const zm={frueh:{kt:['10:00','12:00'],ks:['08:00'],sm:['08:00']},spaet:{kt:['16:00'],ks:['16:00'],sm:['16:00']}};const zeiten=(zm[s]||{})[item.id]||[];return zeiten.map(zeit=>{const m=e.messungen?.[item.id+'_'+zeit]||{};return`<tr><td>${item.name}</td><td>${zeit}</td><td>${m.temp||'–'} °C</td><td>${m.name||'–'}</td></tr>`;}).join('');}).join('')}
          </tbody></table></div>
        </div>
      </div>`;
    });
    if(!hatEintrag)html+=`<div class="banner banner-warn" style="margin-bottom:8px">⚠️ Keine Einträge für ${datum}</div>`;
  });
  list.innerHTML=html||'<p style="color:var(--light)">Keine Einträge.</p>';
}

function printKuehl(key,datum,schicht){
  const e=db.kuehltheke?db.kuehltheke[key]:null;
  const sObj=SCHICHTEN.find(s=>s.id===schicht)||{name:schicht};
  const zeiten_map={frueh:{kt:['10:00','12:00'],ks:['08:00'],sm:['08:00']},spaet:{kt:['16:00'],ks:['16:00'],sm:['16:00']}};
  const zm=zeiten_map[schicht]||zeiten_map.frueh;
  const rows=KUEHL_ITEMS.map(item=>{
    const zeiten=zm[item.id]||[];
    return zeiten.map(zeit=>{
      const m=e?.messungen?.[item.id+'_'+zeit]||{};
      return `<tr><td>${item.name}</td><td>${zeit}</td><td>${m.temp||'–'} °C</td><td>${m.name||'–'}</td></tr>`;
    }).join('');
  }).join('');
  openPrint(pHead(`Kühlpläne – ${fname(U)} – ${datum}`)+`
    <p><strong>Filiale:</strong> ${fname(U)} &nbsp;|&nbsp; <strong>Schicht:</strong> ${sObj?.name||schicht} &nbsp;|&nbsp; <strong>Datum:</strong> ${datum}</p>
    <table style="margin-top:12px"><thead><tr><th>Gerät</th><th>Uhrzeit</th><th>Temperatur</th><th>Gemessen von</th></tr></thead>
    <tbody>${rows}</tbody></table>`+pFoot());
}

// ═══════════════════ PUTZPLAN ═══════════════════
const PUTZ_TAEGLICH = ['Preisschilder gereinigt','Mikrowelle gereinigt'];
const PUTZ_WOECHENTLICH = ['Brotregal feucht gewischt','Besteckkörbe reinigen','Ablagefächer Theke reinigen',
  'Ablagefächer Küche reinigen','Preisstchilderschiene Theke aussaugen','Sitzflächen reinigen',
  'Stühle reinigen','Trennwände reinigen','Unter- und Neben der Kaffeemaschine reinigen',
  'Eiswürfelbereiter reinigen/desinfizieren','Mülleimer feucht reinigen','Spinnweben Kontrolle',
  'Aufsteller gereinigt','Kühlzüge gereinigt','Kühlschränke gereinigt'];
const PUTZ_MONATLICH = ['Hinter Heizkörper reinigen','Lampen reinigen'];

function renderPutzplan(){
  const mc=document.getElementById('mc');
  if(!db.putzplan)db.putzplan={};
  const monat=today().slice(0,7);
  const datum=today();
  const daysInMonth=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
  const today_day=parseInt(datum.slice(8));

  // Wochentag-Header (Mo Di Mi Do Fr Sa So)
  const wochentage=['Mo','Di','Mi','Do','Fr','Sa','So'];
  // Erster Tag des Monats
  const firstDow=new Date(monat+'-01').getDay(); // 0=So
  const firstMon=(firstDow===0?6:firstDow-1); // 0=Mo

  const dayHeader=Array.from({length:daysInMonth},(_,i)=>{
    const d=i+1;
    const dow=(firstMon+i)%7;
    const isToday=d===today_day;
    const isWE=dow>=5;
    return`<th style="font-size:9px;padding:3px 1px;text-align:center;min-width:26px;
      ${isToday?'background:var(--black);color:white;border-radius:3px':''}
      ${isWE&&!isToday?'color:var(--light)':''}">
      <div>${wochentage[dow]}</div><div>${d}</div>
    </th>`;
  }).join('');

  const makeSection=(titel,items,typ,emoji)=>{
    const rows=items.map(item=>{
      const iKey=`${U}_${monat}_${item}`;
      const checks=db.putzplan[iKey]||{};
      if(typ==='taeglich'){
        const done=checks[datum]||false;
        return`<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;
          background:${done?'var(--green-lt)':'white'};border-radius:var(--rsm);
          border:1.5px solid ${done?'var(--green)':'var(--border)'};margin-bottom:6px">
          <input type="checkbox" style="width:22px;height:22px;flex-shrink:0;cursor:pointer;accent-color:var(--black)"
            ${done?'checked':''} onchange="togglePutz('${iKey}','${datum}',this.checked)">
          <span style="font-size:13px;${done?'text-decoration:line-through;color:var(--light)':''}">${item}</span>
          ${done?'<span style="margin-left:auto;font-size:12px;color:var(--green)">✓ Erledigt</span>':''}
        </div>`;
      }else{
        const cols=Array.from({length:daysInMonth},(_, i)=>{
          const d=String(i+1).padStart(2,'0');
          const dStr=`${monat}-${d}`;
          const done=checks[dStr]||false;
          const isToday=dStr===datum;
          const dow=(firstMon+i)%7;
          const isWE=dow>=5;
          return`<td style="text-align:center;padding:2px;background:${isToday?'#f5f5f5':isWE?'#fafafa':''}">
            <input type="checkbox" style="width:16px;height:16px;cursor:pointer;accent-color:var(--black)"
              ${done?'checked':''} onchange="togglePutz('${iKey}','${dStr}',this.checked)">
          </td>`;
        }).join('');
        const doneCount=Object.values(checks).filter(Boolean).length;
        return`<tr>
          <td style="font-size:12px;padding:6px 12px;white-space:nowrap;min-width:200px">
            ${item}
            ${doneCount?`<span style="font-size:10px;color:var(--green);margin-left:6px">(${doneCount}×)</span>`:''}
          </td>${cols}
        </tr>`;
      }
    }).join('');

    if(typ==='taeglich'){
      const doneAll=items.every(item=>(db.putzplan[`${U}_${monat}_${item}`]||{})[datum]);
      return`<div class="card" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span style="font-size:18px">${emoji}</span>
          <span style="font-weight:700;font-size:14px">${titel}</span>
          ${doneAll?`<span class="st st-bestaetigt" style="margin-left:auto">✅ Alles erledigt</span>`:''}
        </div>
        ${rows}
      </div>`;
    }else{
      return`<div class="card" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span style="font-size:18px">${emoji}</span>
          <span style="font-weight:700;font-size:14px">${titel}</span>
          <span style="font-size:11px;color:var(--light);margin-left:6px">${new Date(monat+'-01').toLocaleDateString('de-DE',{month:'long',year:'numeric'})}</span>
        </div>
        <div class="twrap"><table style="font-size:12px;width:100%">
          <thead><tr><th style="text-align:left;padding:4px 12px;min-width:200px">Aufgabe</th>${dayHeader}</tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
      </div>`;
    }
  };

  mc.innerHTML=`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-weight:700;font-size:15px">🧹 Putzplan · ${fname(U)}</div>
      ${U==='Verwaltung'?`<button class="btn btn-o btn-sm no-print" onclick="window.print()">🖨️ Drucken</button>`:''}
    </div>
    ${makeSection('Täglich',PUTZ_TAEGLICH,'taeglich','📋')}
    ${makeSection('Wöchentliche Aufgaben',PUTZ_WOECHENTLICH,'monatlich','🔄')}
    ${makeSection('Monatliche Aufgaben',PUTZ_MONATLICH,'monatlich','📅')}
  </div>`;
}
