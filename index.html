// ═══════════════════ BACKSTUBE EINGANGSPROTOKOLL ═══════════════════
function renderBsProtokoll(){
  const mc=document.getElementById('mc');
  const sonders=[...db.sonder].sort((a,b)=>b.erstellt.localeCompare(a.erstellt));

  mc.innerHTML=`<div class="card">
    <div class="ctitle">📜 Eingänge</div>
    <p style="font-size:12px;color:var(--light);margin-bottom:14px">Alle eingegangenen Sonderbestellungen – wann · von wem</p>
    <div class="frow">
      <input type="date" id="bp-datum" oninput="refreshBsProtokoll()" placeholder="Datum filtern">
      <select id="bp-fil" onchange="refreshBsProtokoll()">
        <option value="">Alle Filialen</option>
        ${ALLE_FIL.map(f=>`<option value="${f}">${f}</option>`).join('')}
      </select>
    </div>
    <div id="bp-list"></div>
  </div>`;
  refreshBsProtokoll();
}

function refreshBsProtokoll(){
  const datum=document.getElementById('bp-datum')?.value||'';
  const fil=document.getElementById('bp-fil')?.value||'';
  const list=document.getElementById('bp-list');if(!list)return;

  let sonders=[...db.sonder].filter(s=>{
    if(datum&&s.erstellt.slice(0,10)!==datum)return false;
    if(fil&&s.filiale!==fil)return false;
    return true;
  }).sort((a,b)=>b.erstellt.localeCompare(a.erstellt));

  if(!sonders.length){
    list.innerHTML='<p style="color:var(--light);font-size:13px">Keine Eingänge gefunden.</p>';
    return;
  }

  list.innerHTML=`<div class="twrap"><table>
    <thead><tr>
      <th>Eingegangen</th>
      <th>Filiale</th>
      <th>Datum</th>
      <th>Name</th>
      <th>Bestellung</th>
      <th>Status</th>
    </tr></thead>
    <tbody>${sonders.map(s=>`<tr>
      <td style="font-size:12px;white-space:nowrap">${dts(s.erstellt)}</td>
      <td><strong>${fname(s.filiale)}</strong></td>
      <td>${s.datum||'–'}</td>
      <td>${s.name||'–'}</td>
      <td style="font-size:12px;color:var(--mid);max-width:200px">${s.text||'–'}</td>
      <td><span class="st ${stcls(s.status)}">${stlbl(s.status)}</span></td>
    </tr>`).join('')}
    </tbody>
  </table></div>`;
}


function renderVwPutzplan(){
  const mc=document.getElementById('mc');
  const filOpts=ALLE_FIL.map(f=>`<option value="${f}">${f}</option>`).join('');
  mc.innerHTML=`<div class="card">
    <div class="ctitle">🧹 Alle Putzpläne</div>
    <div class="frow">
      <select id="vp-fil" onchange="loadVwPutzplan()"><option value="">Filiale wählen</option>${filOpts}</select>
      <input type="month" id="vp-mon" value="${today().slice(0,7)}" oninput="loadVwPutzplan()">
    </div>
    <div id="vp-content"></div>
  </div>`;
}

function loadVwPutzplan(){
  const fil=document.getElementById('vp-fil')?.value;
  const mon=document.getElementById('vp-mon')?.value||today().slice(0,7);
  const div=document.getElementById('vp-content');if(!div)return;
  if(!fil){div.innerHTML='<p style="color:var(--light)">Filiale wählen.</p>';return;}
  if(!db.putzplan){div.innerHTML='<p style="color:var(--light)">Keine Einträge.</p>';return;}

  const daysInMonth=new Date(parseInt(mon.slice(0,4)),parseInt(mon.slice(5,7)),0).getDate();
  const allItems=[...PUTZ_TAEGLICH,...PUTZ_WOECHENTLICH,...PUTZ_MONATLICH];
  const dayHeaders=Array.from({length:daysInMonth},(_,i)=>
    `<th style="font-size:10px;padding:3px 1px;text-align:center;min-width:24px">${i+1}</th>`).join('');

  const rows=allItems.map(item=>{
    const iKey=`${fil}_${mon}_${item}`;
    const checks=db.putzplan[iKey]||{};
    const cols=Array.from({length:daysInMonth},(_,i)=>{
      const d=String(i+1).padStart(2,'0');
      const done=checks[`${mon}-${d}`]||false;
      return`<td style="text-align:center;padding:2px">${done?'✅':'·'}</td>`;
    }).join('');
    const doneCount=Object.values(checks).filter(Boolean).length;
    return`<tr>
      <td style="font-size:12px;padding:5px 10px;white-space:nowrap">${item}${doneCount?` <span style="color:var(--green);font-size:10px">(${doneCount}×)</span>`:''}</td>
      ${cols}
    </tr>`;
  }).join('');

  div.innerHTML=`<div class="twrap"><table style="font-size:12px">
    <thead><tr><th style="min-width:200px;padding:5px 10px">Aufgabe</th>${dayHeaders}</tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  <div class="brow no-print">${U==='Verwaltung'?`<button class="btn btn-p btn-sm" onclick="window.print()">🖨️ Drucken</button>`:''}</div>`;
}

// ═══════════════════ ANGEKOMMEN MODAL ═══════════════════
function openAngekommenModal(orderId){
  const o=db.bestellungen.find(x=>x.id===orderId);if(!o)return;
  const rows=o.positionen.map(p=>`
    <div class="pack-row" style="grid-template-columns:1fr 70px 70px">
      <div style="font-size:13px;font-weight:500">${p.name}<br><span style="font-size:11px;color:var(--light)">${p.id}</span></div>
      <div style="text-align:center;font-size:13px;color:var(--mid)">${p.menge}</div>
      <input class="pack-inp" type="number" min="0" value="${p.menge}" id="ang-${p.id}" placeholder="${p.menge}">
    </div>`).join('');

  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">📬 Lieferung bestätigen – ${fname(o.filiale)}</div>
        <p style="font-size:12px;color:var(--light);margin-bottom:12px">Tatsächlich angekommen Menge eintragen. Bei Abweichung wird die Verwaltung informiert.</p>
        <div style="display:grid;grid-template-columns:1fr 70px 70px;gap:8px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--light);text-transform:uppercase">
          <div>Artikel</div><div style="text-align:center">Bestellt</div><div style="text-align:center">Angekommen</div>
        </div>
        ${rows}
        <div style="margin-top:12px">
          <label class="flbl">Kommentar (optional)</label>
          <textarea id="ang-kommentar" placeholder="z.B. 3 Stück Espresso fehlten, Karton beschädigt…"
            style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:'Inter',sans-serif;min-height:70px;resize:vertical"></textarea>
        </div>
        <div class="brow" style="margin-top:14px">
          <button class="btn btn-p" onclick="submitAngekommen('${orderId}')">✅ Lieferung bestätigen</button>
          <button class="btn btn-o" onclick="closeModal()">Abbrechen</button>
        </div>
      </div>
    </div>`;
}

function submitAngekommen(orderId){
  const o=db.bestellungen.find(x=>x.id===orderId);if(!o)return;
  const kommentar=document.getElementById('ang-kommentar')?.value.trim()||'';
  const abweichungen=[];
  o.positionen.forEach(p=>{
    const el=document.getElementById('ang-'+p.id);
    const angekommen=el?parseFloat(el.value)||0:p.menge;
    const diff=angekommen-p.menge;
    if(diff!==0){
      abweichungen.push({id:p.id,name:p.name,bestellt:p.menge,angekommen,diff});
    }
    p.angekommen=angekommen;
  });
  o.abweichungen=abweichungen;
  o.ankunftKommentar=kommentar;
  o.hatAbweichung=abweichungen.length>0||kommentar!=='';
  o.status='angekommen';
  if(!o.statusLog)o.statusLog=[];
  o.statusLog.push({
    status:'angekommen',datum:new Date().toISOString(),by:U,
    note: abweichungen.length>0
      ? `⚠️ Abweichungen: ${abweichungen.map(a=>`${a.name}: ${a.bestellt}→${a.angekommen}`).join(', ')}`
      : kommentar||'Vollständig angekommen'
  });
  save();closeModal();
  if(abweichungen.length>0||kommentar){
    toast(`📬 Bestätigt – ${abweichungen.length} Abweichung(en) gemeldet`);
  }else{
    toast('📬 Lieferung vollständig bestätigt!');
  }
  refreshHist();updateStartBanner();
}

function copyArtToAllFil(){
  const fil=document.getElementById('art-fil')?.value;
  if(!fil){toast('Bitte erst Filiale wählen.');return;}
  const source=BAEKO[fil];
  if(!source||!source.length){toast('Keine Artikel in dieser Filiale.');return;}
  if(!confirm(`Artikelliste von ${fil} für ALLE Filialen übernehmen? Bestehende Listen werden ersetzt.`))return;
  ALLE_FIL.forEach(f=>{
    if(f!==fil) BAEKO[f]=[...source.map(a=>({...a}))];
  });
  saveArtikellisten();renderBaekoArtList();
  toast(`✅ Liste von ${fil} für alle ${ALLE_FIL.length} Filialen übernommen.`);
}

function copyMetroToAllFil(){
  // Handelswaren pro Filiale - Hinweis
  toast('HW-Liste gilt bereits für alle Filialen.');
}

function delBaekoArtAlle(artId){
  ALLE_FIL.forEach(f=>{if(BAEKO[f])BAEKO[f]=BAEKO[f].filter(a=>a.id!==artId);});
  saveArtikellisten();renderBaekoArtList();toast('✅ Aus allen Filialen gelöscht.');
}

// ═══ VERWALTUNG: BÄKO BESTELLUNG BEARBEITEN ═══
function openBaekoEdit(orderId){
  const o=db.bestellungen.find(x=>x.id===orderId);if(!o)return;
  const fil=o.filiale;
  const alleArts=BAEKO[fil]||[];
  // Artikel in Bestellung
  const posIds=new Set(o.positionen.map(p=>p.id));
  // Zusätzliche Artikel die noch nicht in Bestellung sind
  const extras=alleArts.filter(a=>!posIds.has(a.id));
  const extraOpts=extras.map(a=>`<option value="${a.id}">${a.name} (${a.id})</option>`).join('');

  const rows=o.positionen.map(p=>`
    <div class="pack-row" style="grid-template-columns:1fr 80px 28px;margin-bottom:5px">
      <div style="font-size:13px;font-weight:500">${p.name}<br>
        <span style="font-size:11px;color:var(--light)">${p.id}</span></div>
      <input class="pack-inp" type="number" min="0" value="${p.menge}" id="be-${p.id}" placeholder="0">
      <button style="background:none;border:none;color:var(--light);cursor:pointer;font-size:16px;padding:0"
        onclick="removeBaekoEditPos('${p.id}')">✕</button>
    </div>`).join('');

  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">✏️ Bäko bearbeiten – ${fname(fil)} · ${o.wocheLabel||''}</div>
        <p style="font-size:12px;color:var(--light);margin-bottom:12px">Mengen anpassen, Artikel entfernen oder ergänzen.</p>
        <div style="display:grid;grid-template-columns:1fr 80px 28px;gap:8px;padding:5px 10px;
          font-size:11px;font-weight:700;color:var(--light);text-transform:uppercase;margin-bottom:4px">
          <div>Artikel</div><div style="text-align:center">Menge</div><div></div>
        </div>
        <div id="be-rows">${rows}</div>
        ${extraOpts?`<div style="margin-top:10px;display:flex;gap:8px;align-items:center">
          <select id="be-add-sel" style="flex:1;padding:8px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px">
            <option value="">+ Artikel ergänzen…</option>${extraOpts}
          </select>
          <input type="number" id="be-add-menge" min="1" value="1" placeholder="Menge"
            style="width:70px;padding:8px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px">
          <button class="btn btn-o btn-sm" onclick="addBaekoEditPos('${orderId}')">+ Add</button>
        </div>`:''}
        <div style="margin-top:12px">
          <label class="flbl">Ihr Name (Pflicht)</label>
          <input type="text" id="be-name" placeholder="Wer hat die Änderung vorgenommen?"
            style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--rsm);
            font-size:13px;font-family:'Inter',sans-serif">
        </div>
        <div class="brow" style="margin-top:14px">
          <button class="btn btn-p" onclick="submitBaekoEdit('${orderId}')">💾 Änderungen speichern</button>
          <button class="btn btn-o" onclick="closeModal()">Abbrechen</button>
        </div>
      </div>
    </div>`;
  // Store orderId for use in add/remove
  window._baekoEditId=orderId;
}

function removeBaekoEditPos(posId){
  const row=document.getElementById('be-'+posId)?.closest('.pack-row');
  if(row)row.remove();
}

function addBaekoEditPos(orderId){
  const sel=document.getElementById('be-add-sel');
  const id=sel?.value;if(!id)return;
  const menge=parseFloat(document.getElementById('be-add-menge')?.value)||1;
  const o=db.bestellungen.find(x=>x.id===orderId);if(!o)return;
  const fil=o.filiale;
  const art=(BAEKO[fil]||[]).find(a=>a.id===id);if(!art)return;
  const rows=document.getElementById('be-rows');
  if(rows){
    rows.innerHTML+=`<div class="pack-row" style="grid-template-columns:1fr 80px 28px;margin-bottom:5px">
      <div style="font-size:13px;font-weight:500">${art.name}<br>
        <span style="font-size:11px;color:var(--light)">${art.id}</span></div>
      <input class="pack-inp" type="number" min="0" value="${menge}" id="be-${art.id}" placeholder="0">
      <button style="background:none;border:none;color:var(--light);cursor:pointer;font-size:16px;padding:0"
        onclick="removeBaekoEditPos('${art.id}')">✕</button>
    </div>`;
  }
  // Remove from dropdown
  sel.querySelector(`option[value="${id}"]`)?.remove();
  sel.value='';
}

function submitBaekoEdit(orderId){
  const o=db.bestellungen.find(x=>x.id===orderId);if(!o)return;
  const name=document.getElementById('be-name')?.value.trim();
  if(!name){toast('Bitte Namen eintragen.');return;}
  const fil=o.filiale;
  const alleArts=BAEKO[fil]||[];
  const aenderungen=[];
  // Neue Positionen aus Modal lesen
  const neuePos=[];
  // Bestehende Positionen
  o.positionen.forEach(p=>{
    const el=document.getElementById('be-'+p.id);
    if(!el)return; // wurde entfernt
    const nm=parseFloat(el.value)||0;
    if(nm>0){
      if(nm!==p.menge)aenderungen.push(`${p.name}: ${p.menge}→${nm}`);
      neuePos.push({...p,menge:nm});
    }else{
      aenderungen.push(`${p.name}: entfernt`);
    }
  });
  // Neu hinzugefügte Artikel
  alleArts.forEach(a=>{
    if(o.positionen.find(p=>p.id===a.id))return; // bereits vorhanden
    const el=document.getElementById('be-'+a.id);
    if(!el)return;
    const nm=parseFloat(el.value)||0;
    if(nm>0){
      neuePos.push({id:a.id,name:a.name,menge:nm});
      aenderungen.push(`${a.name}: neu +${nm}`);
    }
  });
  o.positionen=neuePos;
  if(!o.statusLog)o.statusLog=[];
  o.statusLog.push({
    status:o.status,datum:new Date().toISOString(),by:name,
    note:`Bearbeitet: ${aenderungen.length?aenderungen.join(', '):'keine Änderung'}`
  });
  save();closeModal();
  toast(`✅ Bestellung bearbeitet von ${name}`);
  refVwB();
}

function changeArtId(typ,fil,idx,newId){
  if(typ==='baeko'){if(BAEKO[fil]&&BAEKO[fil][idx])BAEKO[fil][idx].id=newId.trim();}
  else{if(METRO[fil]&&METRO[fil][idx])METRO[fil][idx].id=newId.trim();}
  showSaveBar();
}
function changeBaekoKat(fil,idx,newKat){
  if(!BAEKO[fil]||!BAEKO[fil][idx])return;
  BAEKO[fil][idx].kat=newKat;showSaveBar();
}
function changeMetroKat(fil,idx,newKat){
  if(!METRO[fil]||!METRO[fil][idx])return;
  METRO[fil][idx].kat=newKat;showSaveBar();
}
</script>
